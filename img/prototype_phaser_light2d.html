<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phaser Custom Light Pipeline — Lit Sprites</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; }
</style>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
<script>

const LEVEL_W = 3200;
const LEVEL_H = 600;
const SPRITE_SCALE = 2;
const ANIM_FPS = 12;
const MAX_LIGHTS = 10;

// =====================================================================
// CUSTOM FRAGMENT SHADER
// Uses Phaser's LightPipeline uniform names (so onRender sets them for us)
// but with our half-lambert + soft attenuation from lit_sprite_test.html
// =====================================================================
const CUSTOM_LIGHT_FRAG = `#define SHADER_NAME CUSTOM_LIGHT_FS

precision mediump float;

struct Light
{
    vec2 position;
    vec3 color;
    float intensity;
    float radius;
};

const int kMaxLights = ${MAX_LIGHTS};

uniform vec4 uCamera;
uniform vec2 uResolution;
uniform sampler2D uMainSampler;
uniform sampler2D uNormSampler;
uniform vec3 uAmbientLightColor;
uniform int uLightCount;
uniform Light uLights[kMaxLights];

varying vec2 outTexCoord;
varying float outTexId;
varying float outTintEffect;
varying vec4 outTint;

void main()
{
    vec4 texel = texture2D(uMainSampler, outTexCoord);
    if (texel.a < 0.1) discard;

    vec3 N = normalize(texture2D(uNormSampler, outTexCoord).rgb * 2.0 - 1.0);

    vec3 finalColor = vec3(0.0);

    for (int i = 0; i < kMaxLights; i++)
    {
        if (i >= uLightCount) break;

        Light light = uLights[i];

        vec3 lightDir = vec3(
            (light.position.x - gl_FragCoord.x) / uResolution.x,
            (light.position.y - gl_FragCoord.y) / uResolution.y,
            0.15
        );

        vec3 L = normalize(lightDir);
        float d = length(lightDir.xy) * uCamera.w;

        // Half-lambert — same model as lit_sprite_test.html
        float NdotL = max(dot(N, L), 0.0);
        float hl = NdotL * 0.6 + 0.4;

        // Soft quadratic attenuation — same as lit_sprite_test.html
        float atten = 1.0 / (1.0 + 2.0 * d * d);

        finalColor += light.color * hl * light.intensity * atten;
    }

    vec4 colorOutput = vec4(uAmbientLightColor + finalColor, 1.0);
    gl_FragColor = vec4(texel.rgb * colorOutput.rgb, texel.a);
}
`;

// =====================================================================
// CUSTOM PIPELINE — extends LightPipeline, only swaps the shader
// All plumbing (normal map binding, light uniforms) is inherited
// =====================================================================
class LitSpritePipeline extends Phaser.Renderer.WebGL.Pipelines.LightPipeline {
  constructor(config) {
    if (config instanceof Phaser.Game) {
      config = { game: config };
    }
    config.fragShader = CUSTOM_LIGHT_FRAG;
    config.maxLights = MAX_LIGHTS;
    config.name = 'LitSpritePipeline';
    super(config);
  }
}

// =====================================================================
// SCENE
// =====================================================================
class ProtoScene extends Phaser.Scene {
  constructor() { super('proto'); }

  preload() {
    this.load.spritesheet({
      key: 'idle',
      url: 'idle_color.png',
      normalMap: 'idle_normal.png',
      frameConfig: { frameWidth: 128, frameHeight: 128 }
    });
    this.load.spritesheet({
      key: 'walk_right',
      url: 'walk_right_color.png',
      normalMap: 'walk_right_normal.png',
      frameConfig: { frameWidth: 128, frameHeight: 128 }
    });
    this.load.spritesheet({
      key: 'picking',
      url: 'picking_color.png',
      normalMap: 'picking_normal.png',
      frameConfig: { frameWidth: 128, frameHeight: 128 }
    });
  }

  create() {
    // --- Register custom pipeline ---
    this.renderer.pipelines.add('LitSpritePipeline', new LitSpritePipeline({ game: this.game }));

    // --- Background (depth 0) ---
    this.drawBackground();

    // --- Enable Phaser's light system ---
    this.lights.enable();
    this.lights.setAmbientColor(0x0a0a10);

    // --- Lights via Phaser's native API ---
    this.playerLight = this.lights.addLight(200, LEVEL_H / 2, 350, 0xfff2dd, 1.8);
    this.torchLights = [
      this.lights.addLight(100,  150, 280, 0xff7722, 1.2),
      this.lights.addLight(600,  140, 280, 0xff7722, 1.2),
      this.lights.addLight(1100, 160, 280, 0xff7722, 1.2),
      this.lights.addLight(1600, 140, 280, 0xff7722, 1.2),
      this.lights.addLight(2100, 150, 280, 0xff7722, 1.2),
      this.lights.addLight(2600, 160, 280, 0xff7722, 1.2),
    ];

    // --- Animations ---
    this.anims.create({
      key: 'anim_idle',
      frames: this.anims.generateFrameNumbers('idle', { start: 0, end: 59 }),
      frameRate: ANIM_FPS, repeat: -1
    });
    this.anims.create({
      key: 'anim_walk_right',
      frames: this.anims.generateFrameNumbers('walk_right', { start: 0, end: 29 }),
      frameRate: ANIM_FPS, repeat: -1
    });
    this.anims.create({
      key: 'anim_picking',
      frames: this.anims.generateFrameNumbers('picking', { start: 0, end: 223 }),
      frameRate: ANIM_FPS, repeat: 0
    });

    // --- Player sprite ---
    this.player = this.add.sprite(200, LEVEL_H / 2 + 20, 'idle');
    this.player.setScale(SPRITE_SCALE);
    this.player.setPipeline('LitSpritePipeline');
    this.player.play('anim_idle');
    this.player.setDepth(2);

    // --- Foreground (depth 4) ---
    this.drawForeground();

    // --- Camera ---
    this.cameras.main.setBounds(0, 0, LEVEL_W, LEVEL_H);
    this.cameras.main.startFollow(this.player, true, 0.08, 0.08);

    // --- UI ---
    this.stateText = this.add.text(10, 10,
      'state: idle\nClick: advance | Space: reset',
      { fontSize: '14px', color: '#666', fontFamily: 'monospace', lineSpacing: 4 }
    ).setScrollFactor(0).setDepth(100);

    // --- Input ---
    this.input.on('pointerdown', () => this.nextStep());
    this.input.keyboard.on('keydown-SPACE', () => this.resetPlayer());

    this.busy = false;
    this.stepIndex = 0;
  }

  // -----------------------------------------------------------------
  // Scripted sequence
  // -----------------------------------------------------------------
  nextStep() {
    if (this.busy) return;
    this.busy = true;
    const step = this.stepIndex % 2;
    if (step === 0) this.doWalkAndPick();
    else this.doResumeWalk();
    this.stepIndex++;
  }

  doWalkAndPick() {
    this.setLabel('walk right');
    this.player.play('anim_walk_right');

    this.tweens.add({
      targets: this.player,
      x: this.player.x + 300,
      duration: 2500,
      ease: 'Linear',
      onComplete: () => {
        this.setLabel('picking');
        this.player.play('anim_picking');
        this.player.once('animationcomplete-anim_picking', () => {
          this.player.play('anim_idle');
          this.setLabel('idle (click)');
          this.busy = false;
        });
      }
    });
  }

  doResumeWalk() {
    this.setLabel('walk right');
    this.player.play('anim_walk_right');

    this.tweens.add({
      targets: this.player,
      x: this.player.x + 400,
      duration: 3500,
      ease: 'Linear',
      onComplete: () => {
        this.player.play('anim_idle');
        this.setLabel('idle (click)');
        this.busy = false;
      }
    });
  }

  resetPlayer() {
    this.tweens.killTweensOf(this.player);
    this.player.x = 200;
    this.player.y = LEVEL_H / 2 + 20;
    this.player.play('anim_idle');
    this.busy = false;
    this.stepIndex = 0;
    this.setLabel('idle');
  }

  setLabel(txt) {
    this.stateText.setText('state: ' + txt + '\nClick: advance | Space: reset');
  }

  // -----------------------------------------------------------------
  // Update — lights
  // -----------------------------------------------------------------
  update(time) {
    // Player light follows player
    this.playerLight.x = this.player.x;
    this.playerLight.y = this.player.y - 30;

    // Torch flicker
    this.torchLights.forEach((t, i) => {
      t.intensity = 1.2
        + Math.sin(time * 0.006 + i * 1.7) * 0.4
        + Math.sin(time * 0.013 + i * 3.1) * 0.15;
    });
  }

  // -----------------------------------------------------------------
  // Background (depth 0)
  // -----------------------------------------------------------------
  drawBackground() {
    const g = this.add.graphics().setDepth(0);
    g.fillStyle(0x1a150e);
    g.fillRect(0, 0, LEVEL_W, LEVEL_H);
    g.fillStyle(0x2a1f14);
    g.fillRect(0, LEVEL_H * 0.65, LEVEL_W, LEVEL_H * 0.35);
    g.lineStyle(2, 0x3a2f1f);
    g.lineBetween(0, LEVEL_H * 0.65, LEVEL_W, LEVEL_H * 0.65);

    for (let x = 0; x < LEVEL_W; x += 120) {
      for (let y = 180; y < LEVEL_H * 0.65; y += 60) {
        const offset = (Math.floor(y / 60) % 2) * 60;
        g.fillStyle(0x1f1a12);
        g.fillRect(x + offset, y, 118, 58);
        g.lineStyle(1, 0x151008);
        g.strokeRect(x + offset, y, 118, 58);
      }
    }

    [100, 600, 1100, 1600, 2100, 2600].forEach(x => {
      g.fillStyle(0x4a3a20);
      g.fillRect(x - 4, 150, 8, 25);
      g.fillStyle(0xff8833);
      g.fillCircle(x, 148, 6);
    });
  }

  // -----------------------------------------------------------------
  // Foreground (depth 4)
  // -----------------------------------------------------------------
  drawForeground() {
    const g = this.add.graphics().setDepth(4);
    [450, 950, 1450, 1950, 2450].forEach(x => {
      g.fillStyle(0x0a0a0f, 0.5);
      g.fillRect(x + 4, 120, 44, LEVEL_H - 160);
      g.fillStyle(0x1a1510, 0.85);
      g.fillRect(x, 100, 40, LEVEL_H - 140);
      g.fillStyle(0x2a2015, 0.85);
      g.fillRect(x - 6, 95, 52, 15);
      g.fillRect(x - 6, LEVEL_H - 50, 52, 15);
    });
  }
}

// =====================================================================
// GAME
// =====================================================================
new Phaser.Game({
  type: Phaser.WEBGL,
  width: 800,
  height: LEVEL_H,
  backgroundColor: '#000000',
  scene: ProtoScene,
  pixelArt: true,
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH
  }
});

</script>
</body>
</html>
