<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>FloQuest 3D — Player</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
               background: #1a1a1a; font-family: -apple-system, system-ui, sans-serif; color: #eee; }
  #canvas-host { position: fixed; inset: 0; }
  #info { position: fixed; top: 12px; left: 12px; font-size: 12px; color: #888;
          background: rgba(0,0,0,0.5); padding: 6px 10px; border-radius: 6px; z-index: 5; }
  #result { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 24px; padding: 16px 32px; border-radius: 8px;
            background: rgba(0,0,0,0.8); display: none; z-index: 100; }
</style>
</head>
<body>
<div id="canvas-host"></div>
<div id="info">FloQuest 3D · <b>spazio</b> = skip animazione</div>
<div id="result"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import { createStage } from './engine/bootstrap.js';
import { level1 }      from './levels/level1.js';

try {
  const { director } = await createStage();
  director.start();

  const result = await director.runLevel(level1);
  console.log('Level finished →', result);

  const resultEl = document.getElementById('result');
  resultEl.textContent = result === 'win' ? '✓ Vittoria' : '✗ Morte';
  resultEl.style.display = 'block';
  resultEl.style.color = result === 'win' ? '#9eea7a' : '#ea7a7a';
} catch (e) {
  document.getElementById('info').textContent = 'Errore: ' + e.message;
  throw e;
}
</script>
</body>
</html>
