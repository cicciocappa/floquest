<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FloQuest — Level Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e; color: #ccc; font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 13px; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    user-select: none;
  }

  /* ---- TOOLBAR ---- */
  #toolbar {
    display: flex; align-items: center; gap: 8px; padding: 6px 12px;
    background: #16213e; border-bottom: 1px solid #0f3460; flex-shrink: 0;
    flex-wrap: wrap;
  }
  #toolbar button {
    background: #0f3460; color: #a8b8d8; border: 1px solid #1a4080;
    padding: 4px 12px; font-size: 12px; cursor: pointer; border-radius: 3px;
  }
  #toolbar button:hover { background: #1a4080; color: #fff; }
  #toolbar button.active { background: #e94560; color: #fff; border-color: #e94560; }
  #toolbar .sep { width: 1px; height: 24px; background: #0f3460; margin: 0 4px; }
  #toolbar label { color: #7a8aaa; font-size: 11px; }
  #toolbar input[type=number] {
    width: 55px; background: #0a0a1a; color: #aac; border: 1px solid #1a4080;
    padding: 2px 4px; font-size: 12px; border-radius: 2px;
  }
  #toolbar select {
    background: #0a0a1a; color: #aac; border: 1px solid #1a4080;
    padding: 2px 4px; font-size: 12px; border-radius: 2px;
  }

  /* ---- MAIN AREA ---- */
  #main {
    display: flex; flex: 1; overflow: hidden;
  }

  /* ---- LEFT PANEL: TEXTURES ---- */
  #texPanel {
    width: 200px; background: #111827; border-right: 1px solid #0f3460;
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  #texPanel h3 {
    padding: 8px; font-size: 12px; color: #5a7aaa; border-bottom: 1px solid #1a2a4a;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  #texList {
    flex: 1; overflow-y: auto; padding: 4px;
  }
  .tex-item {
    display: flex; align-items: center; gap: 6px; padding: 4px 6px;
    cursor: pointer; border-radius: 3px; margin-bottom: 2px;
  }
  .tex-item:hover { background: #1a2a4a; }
  .tex-item.selected { background: #0f3460; }
  .tex-item canvas { border: 1px solid #333; flex-shrink: 0; }
  .tex-item span { font-size: 11px; color: #8899bb; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #texDropZone {
    padding: 12px; text-align: center; color: #446; font-size: 11px;
    border: 2px dashed #1a2a4a; margin: 8px; border-radius: 4px;
  }
  #texDropZone:hover { border-color: #3a5a8a; color: #668; }

  /* ---- CANVAS AREA ---- */
  #canvasArea {
    flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden;
  }
  #viewport {
    flex: 1; overflow: hidden; cursor: default; position: relative;
  }
  #viewport canvas { position: absolute; top: 0; left: 0; }

  /* ---- MINIMAP ---- */
  #minimap {
    height: 60px; background: #0a0a16; border-top: 1px solid #0f3460;
    position: relative; cursor: pointer; flex-shrink: 0;
  }
  #minimap canvas { width: 100%; height: 100%; }

  /* ---- RIGHT PANEL: PROPERTIES ---- */
  #propPanel {
    width: 220px; background: #111827; border-left: 1px solid #0f3460;
    display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto;
  }
  #propPanel h3 {
    padding: 8px; font-size: 12px; color: #5a7aaa; border-bottom: 1px solid #1a2a4a;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  #propContent { padding: 8px; }
  .prop-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .prop-row label { font-size: 11px; color: #7a8aaa; }
  .prop-row input, .prop-row select {
    width: 90px; background: #0a0a1a; color: #aac; border: 1px solid #1a4080;
    padding: 2px 4px; font-size: 12px; border-radius: 2px;
  }
  .prop-row input[type=checkbox] { width: auto; }

  /* ---- ALIGN BUTTONS ---- */
  .align-btn {
    background: #0f3460; color: #a8b8d8; border: 1px solid #1a4080;
    padding: 4px 2px; font-size: 11px; cursor: pointer; border-radius: 3px;
    text-align: center;
  }
  .align-btn:hover { background: #1a4080; color: #fff; }
  .prop-section-title {
    font-size: 11px; color: #5a7aaa; margin: 8px 0 6px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }

  /* ---- STATUS BAR ---- */
  #statusBar {
    padding: 3px 12px; background: #0a0f1e; border-top: 1px solid #0f3460;
    font-size: 11px; color: #556; display: flex; justify-content: space-between;
    flex-shrink: 0;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <button id="btnSelect" class="active" title="Select / Move (V)">Select</button>
  <button id="btnRect" title="Draw tiled rectangle (R)">Tiled Rect</button>
  <button id="btnSprite" title="Place sprite (S)">Sprite</button>
  <button id="btnLight" title="Place light (L)">Light</button>
  <div class="sep"></div>
  <button id="btnCopy" title="Copy (Ctrl+C)">Copy</button>
  <button id="btnPaste" title="Paste (Ctrl+V)">Paste</button>
  <button id="btnDelete" title="Delete (Del)">Delete</button>
  <button id="btnHide" title="Hide selected (H)">Hide</button>
  <button id="btnShowAll" title="Show all hidden">Show All</button>
  <button id="btnToTop" title="Bring to top within layer (])">&#x2191; Top</button>
  <button id="btnToBottom" title="Push to bottom within layer ([)">&#x2193; Bottom</button>
  <div class="sep"></div>
  <label>Sky H:</label>
  <input type="number" id="inpSkyH" value="224" min="0" max="600" step="8">
  <div class="sep"></div>
  <label>Layer:</label>
  <select id="selLayer">
    <option value="0">0 — Background</option>
    <option value="1">1 — Behind all</option>
    <option value="2">2 — Behind C2-C4</option>
    <option value="3" selected>3 — Behind C3-C4</option>
    <option value="4">4 — Behind C4</option>
    <option value="5">5 — Foreground</option>
  </select>
  <div class="sep"></div>
  <button id="btnGuides" class="active" title="Toggle guides">Guides</button>
  <div class="sep"></div>
  <button id="btnPreview" title="Phaser preview with lighting (F5)">Preview</button>
  <button id="btnExport" title="Export level layout JSON">Export</button>
  <button id="btnImport" title="Import level layout JSON">Import</button>
  <input type="file" id="fileImport" accept=".json" style="display:none">
  <div class="sep"></div>
  <button id="btnSaveTex" title="Save texture catalog to textures.json">Save Textures</button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- LEFT: Textures -->
  <div id="texPanel">
    <h3 style="display:flex;justify-content:space-between;align-items:center;">
      Textures
      <button id="btnReloadTex" title="Reload all textures from disk" style="background:#0f3460;color:#a8b8d8;border:1px solid #1a4080;padding:2px 8px;font-size:10px;cursor:pointer;border-radius:2px;">Reload</button>
    </h3>
    <div id="texList"></div>
    <div id="texAnimProps" style="display:none; padding:6px; background:#0a1a30; border:1px solid #1a3060; margin:4px 0; font-size:11px;">
      <div style="color:#88aacc; margin-bottom:4px; font-weight:bold;">Spritesheet</div>
      <div class="prop-row"><label>Frame W</label><input type="number" id="texFW" min="1" step="1" style="width:60px;"></div>
      <div class="prop-row"><label>Frame H</label><input type="number" id="texFH" min="1" step="1" style="width:60px;"></div>
      <div class="prop-row"><label>FPS</label><input type="number" id="texFPS" value="10" min="1" max="60" step="1" style="width:60px;"></div>
      <div class="prop-row"><label>Frames</label><span id="texFrameCount" style="color:#aac;">—</span></div>
    </div>
    <div id="texDropZone">Drop images here<br>or click to load</div>
    <input type="file" id="texFileInput" accept="image/*" multiple style="display:none">
  </div>

  <!-- CENTER: Canvas -->
  <div id="canvasArea">
    <div id="viewport">
      <canvas id="cvs"></canvas>
    </div>
    <div id="minimap">
      <canvas id="minimapCvs"></canvas>
    </div>
  </div>

  <!-- RIGHT: Properties -->
  <div id="propPanel">
    <h3>Properties</h3>
    <div id="propContent">
      <p style="color:#446; font-size:11px;">Select an element</p>
    </div>
  </div>
</div>

<!-- STATUS -->
<div id="statusBar">
  <span id="statusLeft">Ready</span>
  <span id="statusRight">Zoom: 100%</span>
</div>

<script>
// =====================================================================
// CONSTANTS
// =====================================================================
const TILE_INTRO = 500;
const TILE_QUESTION = 900;
const TILE_OUTRO = 500;  // 5 walk_right after Q10 to reveal the goal graphic
const NUM_QUESTIONS = 10;
const CANVAS_W = TILE_INTRO + TILE_QUESTION * NUM_QUESTIONS + TILE_OUTRO; // 10000
const CANVAS_H = 960;

// Corridor calculation (mirrors prototype)
const WALK_RIGHT_PX = 100;

// =====================================================================
// TEXTURE CATALOG — loaded from img/bg/textures.json at startup
// =====================================================================
const TEX_CATALOG_URL = '../img/bg/textures.json';
const TEX_BASE_PATH = '../img/bg/';
let texCatalogHandle = null; // File System Access API handle for saving

// =====================================================================
// STATE
// =====================================================================
const state = {
  tool: 'select',        // select | rect | sprite
  zoom: 0.15,
  panX: 0,
  panY: 0,
  skyHeight: 224,
  showGuides: true,
  // Level lighting config
  ambientColor: '#0a0a10',
  lightMultiplier: 1.0,
  playerLight: false,        // whether player has its own light
  playerLightIntensity: 1.0,
  playerLightRadius: 400,
  playerLightColor: '#fff2dd',
  elements: [],          // { id, type, x, y, w, h, texId, layer, tile, tint?, groupId? }
  textures: {},          // texId -> { img, name, w, h }
  groups: {},            // groupId -> { name }
  selectedIds: new Set(),
  primarySelectedId: null,   // which element shows in properties panel (within group selection)
  clipboard: null,
  nextId: 1,
  nextGroupId: 1,
  history: [],
  historyIndex: -1,
  dragging: null,        // { mode, startX, startY, origPositions }
  drawStart: null,       // { x, y } for rect drawing
  rubberBand: null,      // { x, y, w, h } in world coords for box selection
  selectedTexId: null,
};

// =====================================================================
// UNDO / REDO
// =====================================================================
const MAX_HISTORY = 80;

function captureSnapshot() {
  return {
    elements: JSON.parse(JSON.stringify(state.elements)),
    groups: JSON.parse(JSON.stringify(state.groups)),
    skyHeight: state.skyHeight,
    nextId: state.nextId,
    nextGroupId: state.nextGroupId,
    ambientColor: state.ambientColor,
    lightMultiplier: state.lightMultiplier,
    playerLight: state.playerLight,
    playerLightIntensity: state.playerLightIntensity,
    playerLightRadius: state.playerLightRadius,
    playerLightColor: state.playerLightColor,
  };
}

function restoreSnapshot(snap) {
  state.elements = JSON.parse(JSON.stringify(snap.elements));
  state.groups = JSON.parse(JSON.stringify(snap.groups));
  state.skyHeight = snap.skyHeight;
  state.nextId = snap.nextId;
  state.nextGroupId = snap.nextGroupId;
  state.ambientColor = snap.ambientColor;
  state.lightMultiplier = snap.lightMultiplier;
  state.playerLight = snap.playerLight;
  state.playerLightIntensity = snap.playerLightIntensity;
  state.playerLightRadius = snap.playerLightRadius;
  state.playerLightColor = snap.playerLightColor;
  document.getElementById('inpSkyH').value = state.skyHeight;
  state.selectedIds.clear();
  updateProperties();
  render();
}

function pushHistory() {
  // Discard any redo states ahead of current index
  state.history.splice(state.historyIndex + 1);
  state.history.push(captureSnapshot());
  if (state.history.length > MAX_HISTORY) state.history.shift();
  state.historyIndex = state.history.length - 1;
}

function undo() {
  if (state.historyIndex <= 0) return;
  state.historyIndex--;
  restoreSnapshot(state.history[state.historyIndex]);
}

function redo() {
  if (state.historyIndex >= state.history.length - 1) return;
  state.historyIndex++;
  restoreSnapshot(state.history[state.historyIndex]);
}

// =====================================================================
// CORRIDOR GEOMETRY (parameterized by skyHeight)
// =====================================================================
function getCorridors(skyH) {
  const floorH = CANVAS_H - skyH;
  const laneH = floorH / 4;
  const corridors = [];
  for (let i = 0; i < 4; i++) {
    corridors.push({
      y: skyH + laneH * (i + 0.5),
      laneTop: skyH + laneH * i,
      laneH: laneH,
    });
  }
  const centerY = skyH + floorH / 2;
  return { corridors, centerY, floorH, laneH, floorTop: skyH };
}

// Per-question trajectory (mirrors GameScene): 3 walk_right decision (Q visible)
// → DIAG_DX diagonal into corridor → 4 walk_right in corridor → DIAG_DX diagonal
// back to centre. Fixed 900 px stride for every corridor.
const DIAG_DX = 100;
const CORRIDOR_WALK_STEPS = 4;
const DECISION_WALK_STEPS = 3;

function getQuestionTrajectory(skyH, corridorIndex) {
  const { corridors, centerY } = getCorridors(skyH);
  const c = corridors[corridorIndex];

  const cy = centerY;
  const ty = c.y;

  const points = [];
  let x = 0;

  // Decision window — Q_n visible, player walks at centre Y
  points.push({ x, y: cy, label: 'Q appear' });
  x += WALK_RIGHT_PX * DECISION_WALK_STEPS;
  points.push({ x, y: cy, label: 'lock-in' });

  // Diagonal into the chosen corridor
  x += DIAG_DX;
  points.push({ x, y: ty, label: 'in corridor' });

  // Straight walk inside the corridor
  x += WALK_RIGHT_PX * CORRIDOR_WALK_STEPS;
  points.push({ x, y: ty, label: 'return start' });

  // Diagonal back to centre
  x += DIAG_DX;
  points.push({ x, y: cy, label: 'back center' });

  return points;
}

// =====================================================================
// CANVAS / RENDERING
// =====================================================================
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
const minimapCvs = document.getElementById('minimapCvs');
const mctx = minimapCvs.getContext('2d');
const viewport = document.getElementById('viewport');

function resize() {
  const rect = viewport.getBoundingClientRect();
  cvs.width = rect.width;
  cvs.height = rect.height;

  const mrect = document.getElementById('minimap').getBoundingClientRect();
  minimapCvs.width = mrect.width;
  minimapCvs.height = mrect.height;

  render();
}

function worldToScreen(wx, wy) {
  return {
    x: (wx - state.panX) * state.zoom,
    y: (wy - state.panY) * state.zoom
  };
}

function screenToWorld(sx, sy) {
  return {
    x: sx / state.zoom + state.panX,
    y: sy / state.zoom + state.panY
  };
}

function render() {
  const w = cvs.width, h = cvs.height;
  ctx.clearRect(0, 0, w, h);

  ctx.save();
  ctx.scale(state.zoom, state.zoom);
  ctx.translate(-state.panX, -state.panY);

  // Background
  ctx.fillStyle = '#0d0d18';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // Sky area
  if (state.skyHeight > 0) {
    ctx.fillStyle = '#12121f';
    ctx.fillRect(0, 0, CANVAS_W, state.skyHeight);
  }

  // Floor lanes
  const { corridors, centerY, laneH, floorTop } = getCorridors(state.skyHeight);
  const laneColors = ['#141420', '#111120', '#141420', '#111120'];
  corridors.forEach((c, i) => {
    ctx.fillStyle = laneColors[i];
    ctx.fillRect(0, c.laneTop, CANVAS_W, laneH);
  });

  // Render elements sorted by layer (lights last, on top), skip hidden
  const sorted = state.elements.filter(e => !e.hidden).sort((a, b) => {
    if (a.type === 'light' && b.type !== 'light') return 1;
    if (a.type !== 'light' && b.type === 'light') return -1;
    return a.layer - b.layer;
  });
  // Group color palette for visual indicators
  const groupColors = ['#44aaff', '#ff8844', '#44ff88', '#ff44aa', '#aaff44', '#aa44ff', '#44ffdd', '#ffdd44'];
  const groupColorMap = {};
  let gcIdx = 0;
  Object.keys(state.groups).forEach(gid => {
    groupColorMap[gid] = groupColors[gcIdx++ % groupColors.length];
  });

  sorted.forEach(el => {
    const isSel = state.selectedIds.has(el.id);
    if (el.type === 'light') {
      renderLight(ctx, el, isSel);
    } else {
      renderElement(ctx, el);
      // Group indicator: thin colored border
      if (el.groupId && groupColorMap[String(el.groupId)]) {
        ctx.strokeStyle = groupColorMap[String(el.groupId)] + '60';
        ctx.lineWidth = 2 / state.zoom;
        ctx.strokeRect(el.x, el.y, el.w, el.h);
      }
      // Trap indicator: orange dashed border + small "T" label
      if (el.trap) {
        ctx.strokeStyle = '#ff880088';
        ctx.lineWidth = 2 / state.zoom;
        ctx.setLineDash([3 / state.zoom, 3 / state.zoom]);
        ctx.strokeRect(el.x, el.y, el.w, el.h);
        ctx.setLineDash([]);
        var ts = 10 / state.zoom;
        ctx.fillStyle = '#ff8800cc';
        ctx.font = Math.round(ts) + 'px monospace';
        ctx.fillText('T', el.x + 2 / state.zoom, el.y + ts + 1 / state.zoom);
      }
      // Ending indicator: cyan dashed border + small "E" label
      if (el.ending) {
        ctx.strokeStyle = '#22ddff88';
        ctx.lineWidth = 2 / state.zoom;
        ctx.setLineDash([3 / state.zoom, 3 / state.zoom]);
        ctx.strokeRect(el.x, el.y, el.w, el.h);
        ctx.setLineDash([]);
        var es = 10 / state.zoom;
        ctx.fillStyle = '#22ddffcc';
        ctx.font = Math.round(es) + 'px monospace';
        ctx.fillText('E', el.x + el.w - es - 2 / state.zoom, el.y + es + 1 / state.zoom);
      }
      if (isSel) {
        const isPrimary = el.id === state.primarySelectedId && state.selectedIds.size > 1;
        ctx.strokeStyle = isPrimary ? '#ffffff' : '#e94560';
        ctx.lineWidth = (isPrimary ? 3 : 2) / state.zoom;
        ctx.setLineDash([6 / state.zoom, 4 / state.zoom]);
        ctx.strokeRect(el.x, el.y, el.w, el.h);
        ctx.setLineDash([]);

        // Resize handle (only for single selection)
        if (state.selectedIds.size === 1) {
          const hs = 8 / state.zoom;
          ctx.fillStyle = '#e94560';
          ctx.fillRect(el.x + el.w - hs, el.y + el.h - hs, hs, hs);
        }
      }
    }
  });

  // Rubber band selection rect
  if (state.rubberBand) {
    const rb = state.rubberBand;
    ctx.strokeStyle = '#4488ff';
    ctx.fillStyle = '#4488ff18';
    ctx.lineWidth = 1 / state.zoom;
    ctx.setLineDash([4 / state.zoom]);
    const rx = Math.min(rb.x, rb.x + rb.w);
    const ry = Math.min(rb.y, rb.y + rb.h);
    const rw = Math.abs(rb.w);
    const rh = Math.abs(rb.h);
    ctx.fillRect(rx, ry, rw, rh);
    ctx.strokeRect(rx, ry, rw, rh);
    ctx.setLineDash([]);
  }

  // Guides
  if (state.showGuides) {
    renderGuides(ctx);
  }

  // Draw rect preview
  if (state.tool === 'rect' && state.drawStart) {
    ctx.strokeStyle = '#4488ff';
    ctx.lineWidth = 1 / state.zoom;
    ctx.setLineDash([4 / state.zoom]);
    const ds = state.drawStart;
    ctx.strokeRect(ds.x, ds.y, ds.w || 0, ds.h || 0);
    ctx.setLineDash([]);
  }

  ctx.restore();

  // Tile boundaries overlay (screen space)
  ctx.save();
  ctx.strokeStyle = '#ffffff10';
  ctx.setLineDash([4, 4]);
  ctx.lineWidth = 1;
  // Intro tile
  const introEnd = worldToScreen(TILE_INTRO, 0);
  ctx.beginPath();
  ctx.moveTo(introEnd.x, 0);
  ctx.lineTo(introEnd.x, h);
  ctx.stroke();
  // Question tiles
  for (let i = 1; i <= NUM_QUESTIONS; i++) {
    const tx = worldToScreen(TILE_INTRO + TILE_QUESTION * i, 0);
    ctx.beginPath();
    ctx.moveTo(tx.x, 0);
    ctx.lineTo(tx.x, h);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.restore();

  renderMinimap();
  updateStatus();
}

function renderElement(c, el) {
  const tex = state.textures[el.texId];
  if (!tex) {
    c.fillStyle = '#2a1a2a';
    c.fillRect(el.x, el.y, el.w, el.h);
    c.strokeStyle = '#553355';
    c.lineWidth = 1;
    c.strokeRect(el.x, el.y, el.w, el.h);
    return;
  }

  const hasTransform = el.flipX || el.flipY || el.rotation;
  if (hasTransform) {
    c.save();
    const cx = el.x + el.w / 2;
    const cy = el.y + el.h / 2;
    c.translate(cx, cy);
    if (el.rotation) c.rotate(el.rotation * Math.PI / 180);
    c.scale(el.flipX ? -1 : 1, el.flipY ? -1 : 1);
    c.translate(-cx, -cy);
  }

  // Determine source rect (first frame for spritesheets, full image otherwise)
  const srcX = 0, srcY = 0;
  const srcW = tex.frameWidth || tex.img.naturalWidth;
  const srcH = tex.frameHeight || tex.img.naturalHeight;

  if (el.tile) {
    c.save();
    c.beginPath();
    c.rect(el.x, el.y, el.w, el.h);
    c.clip();
    for (let ty = el.y; ty < el.y + el.h; ty += srcH) {
      for (let tx = el.x; tx < el.x + el.w; tx += srcW) {
        c.drawImage(tex.img, srcX, srcY, srcW, srcH, tx, ty, srcW, srcH);
      }
    }
    c.restore();
  } else {
    c.drawImage(tex.img, srcX, srcY, srcW, srcH, el.x, el.y, el.w, el.h);
  }

  // Tint overlay
  if (el.tint) {
    c.save();
    c.globalCompositeOperation = 'multiply';
    c.fillStyle = el.tint;
    c.fillRect(el.x, el.y, el.w, el.h);
    c.restore();
  }

  if (hasTransform) c.restore();

  // Spritesheet badge (outside transform so it stays readable)
  if (tex.frameWidth) {
    c.save();
    c.font = (12 / (c.getTransform().a || 1)) + 'px monospace';
    c.fillStyle = '#ff8844';
    c.fillText('\u25B6', el.x + 2 / (c.getTransform().a || 1), el.y + 14 / (c.getTransform().a || 1));
    c.restore();
  }
}

function renderLight(c, el, selected) {
  const color = el.lightColor || '#fff2dd';
  const intensity = el.lightIntensity || 1.0;
  const isDir = el.lightMode === 'directional';

  // Parse hex color to rgb
  const hex = color.replace('#', '');
  const cr = parseInt(hex.substring(0, 2), 16) || 255;
  const cg = parseInt(hex.substring(2, 4), 16) || 242;
  const cb = parseInt(hex.substring(4, 6), 16) || 221;

  const iconR = 10 / state.zoom;
  const selColor = '#e94560';

  if (isDir) {
    // --- DIRECTIONAL LIGHT ---
    // Icon: diamond shape
    const d = iconR * 1.2;
    c.fillStyle = selected ? selColor : `rgba(${cr},${cg},${cb},0.9)`;
    c.beginPath();
    c.moveTo(el.x, el.y - d);
    c.lineTo(el.x + d, el.y);
    c.lineTo(el.x, el.y + d);
    c.lineTo(el.x - d, el.y);
    c.closePath();
    c.fill();

    // Direction arrow
    const dx = el.lightDirX || 0.3;
    const dy = el.lightDirY || -0.7;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    const arrowLen = 60 / state.zoom;
    const ax = (dx / len) * arrowLen;
    const ay = (dy / len) * arrowLen;

    c.strokeStyle = selected ? selColor : `rgba(${cr},${cg},${cb},0.7)`;
    c.lineWidth = 2 / state.zoom;
    c.beginPath();
    c.moveTo(el.x, el.y);
    c.lineTo(el.x + ax, el.y + ay);
    c.stroke();

    // Arrowhead
    const headLen = 10 / state.zoom;
    const angle = Math.atan2(ay, ax);
    c.beginPath();
    c.moveTo(el.x + ax, el.y + ay);
    c.lineTo(el.x + ax - headLen * Math.cos(angle - 0.4), el.y + ay - headLen * Math.sin(angle - 0.4));
    c.moveTo(el.x + ax, el.y + ay);
    c.lineTo(el.x + ax - headLen * Math.cos(angle + 0.4), el.y + ay - headLen * Math.sin(angle + 0.4));
    c.stroke();

    // Label
    c.fillStyle = '#ffffff40';
    c.font = (10 / state.zoom) + 'px monospace';
    c.fillText('DIR I:' + intensity.toFixed(1), el.x + iconR + 4 / state.zoom, el.y - 4 / state.zoom);

  } else {
    // --- POINT LIGHT ---
    const r = el.lightRadius || 400;

    // Radial gradient for light radius preview
    c.save();
    c.globalCompositeOperation = 'lighter';
    const grad = c.createRadialGradient(el.x, el.y, 0, el.x, el.y, r);
    const a = Math.min(0.35, intensity * 0.15);
    grad.addColorStop(0, `rgba(${cr},${cg},${cb},${a})`);
    grad.addColorStop(0.5, `rgba(${cr},${cg},${cb},${a * 0.4})`);
    grad.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
    c.fillStyle = grad;
    c.beginPath();
    c.arc(el.x, el.y, r, 0, Math.PI * 2);
    c.fill();
    c.restore();

    // Icon: circle with crosshair
    c.fillStyle = selected ? selColor : `rgba(${cr},${cg},${cb},0.9)`;
    c.beginPath();
    c.arc(el.x, el.y, iconR, 0, Math.PI * 2);
    c.fill();

    // Crosshair
    const ch = 16 / state.zoom;
    c.strokeStyle = selected ? selColor : `rgba(${cr},${cg},${cb},0.5)`;
    c.lineWidth = 1 / state.zoom;
    c.beginPath();
    c.moveTo(el.x - ch, el.y); c.lineTo(el.x + ch, el.y);
    c.moveTo(el.x, el.y - ch); c.lineTo(el.x, el.y + ch);
    c.stroke();

    // Radius circle outline
    c.strokeStyle = selected ? selColor + '80' : `rgba(${cr},${cg},${cb},0.15)`;
    c.lineWidth = 1 / state.zoom;
    c.setLineDash([6 / state.zoom, 4 / state.zoom]);
    c.beginPath();
    c.arc(el.x, el.y, r, 0, Math.PI * 2);
    c.stroke();
    c.setLineDash([]);

    // Label
    c.fillStyle = '#ffffff40';
    c.font = (10 / state.zoom) + 'px monospace';
    c.fillText('R:' + r + ' I:' + intensity.toFixed(1), el.x + iconR + 4 / state.zoom, el.y - 4 / state.zoom);
  }
}

function renderGuides(c) {
  const { corridors, centerY } = getCorridors(state.skyHeight);

  // Sky line
  if (state.skyHeight > 0) {
    c.strokeStyle = '#4466aa30';
    c.lineWidth = 1;
    c.setLineDash([8, 4]);
    c.beginPath();
    c.moveTo(0, state.skyHeight);
    c.lineTo(CANVAS_W, state.skyHeight);
    c.stroke();
    c.setLineDash([]);

    c.fillStyle = '#4466aa40';
    c.font = '12px monospace';
    c.fillText('SKY: ' + state.skyHeight + 'px', 8, state.skyHeight - 4);
  }

  // Center line
  c.strokeStyle = '#88aa4440';
  c.lineWidth = 1;
  c.beginPath();
  c.moveTo(0, centerY);
  c.lineTo(CANVAS_W, centerY);
  c.stroke();

  // Corridor center lines
  const cColors = ['#ff444430', '#44aaff30', '#44ff8830', '#ffaa4430'];
  corridors.forEach((cor, i) => {
    c.strokeStyle = cColors[i];
    c.lineWidth = 1;
    c.setLineDash([4, 8]);
    c.beginPath();
    c.moveTo(0, cor.y);
    c.lineTo(CANVAS_W, cor.y);
    c.stroke();
    c.setLineDash([]);
  });

  // Trajectories for all 4 corridors across all questions
  const trajColors = ['#ff4444', '#4488ff', '#44ff88', '#ffaa44'];
  for (let ci = 0; ci < 4; ci++) {
    c.strokeStyle = trajColors[ci] + '60';
    c.lineWidth = 2;

    for (let q = 0; q < NUM_QUESTIONS; q++) {
      const baseX = TILE_INTRO + TILE_QUESTION * q;
      const pts = getQuestionTrajectory(state.skyHeight, ci);

      c.beginPath();
      pts.forEach((p, j) => {
        const sx = baseX + p.x;
        if (j === 0) c.moveTo(sx, p.y);
        else c.lineTo(sx, p.y);
      });
      c.stroke();
    }
  }

  // Tile labels
  c.fillStyle = '#ffffff20';
  c.font = '14px monospace';
  c.fillText('INTRO', 8, 20);
  for (let i = 0; i < NUM_QUESTIONS; i++) {
    c.fillText('Q' + (i + 1), TILE_INTRO + TILE_QUESTION * i + 8, 20);
  }
  c.fillText('GOAL', TILE_INTRO + TILE_QUESTION * NUM_QUESTIONS + 8, 20);
}

function renderMinimap() {
  const mw = minimapCvs.width, mh = minimapCvs.height;
  mctx.clearRect(0, 0, mw, mh);

  const scale = mw / CANVAS_W;
  const sy = mh / CANVAS_H;

  // Background
  mctx.fillStyle = '#0a0a14';
  mctx.fillRect(0, 0, mw, mh);

  // Sky
  if (state.skyHeight > 0) {
    mctx.fillStyle = '#1a1a2a';
    mctx.fillRect(0, 0, mw, state.skyHeight * sy);
  }

  // Elements
  state.elements.forEach(el => {
    const tex = state.textures[el.texId];
    mctx.fillStyle = tex ? '#334' : '#2a1a2a';
    mctx.fillRect(el.x * scale, el.y * sy, Math.max(1, el.w * scale), Math.max(1, el.h * sy));
  });

  // Viewport rect
  const vx = state.panX * scale;
  const vy = state.panY * sy;
  const vw = (cvs.width / state.zoom) * scale;
  const vh = (cvs.height / state.zoom) * sy;
  mctx.strokeStyle = '#e94560';
  mctx.lineWidth = 1.5;
  mctx.strokeRect(vx, vy, vw, vh);
}

function updateStatus() {
  const zoomPct = Math.round(state.zoom * 100);
  document.getElementById('statusRight').textContent =
    'Zoom: ' + zoomPct + '%  |  Canvas: ' + CANVAS_W + 'x' + CANVAS_H;
  const hiddenCount = state.elements.filter(e => e.hidden).length;
  document.getElementById('statusLeft').textContent =
    'Elements: ' + state.elements.length +
    (hiddenCount ? '  (' + hiddenCount + ' hidden)' : '') +
    (state.selectedIds.size > 0 ? '  |  Selected: ' + state.selectedIds.size : '');
}

function addElement(type, x, y, w, h, texId, layer, tile) {
  pushHistory();
  const el = {
    id: state.nextId++,
    type, x: Math.round(x), y: Math.round(y),
    w: Math.round(w), h: Math.round(h),
    texId: texId || null,
    layer: layer != null ? layer : parseInt(document.getElementById('selLayer').value),
    tile: !!tile,
  };
  state.elements.push(el);
  selectElement(el.id);
  render();
  return el;
}

function addLight(x, y) {
  pushHistory();
  const el = {
    id: state.nextId++,
    type: 'light',
    x: Math.round(x), y: Math.round(y),
    w: 0, h: 0,       // not used for lights
    texId: null, layer: 10, tile: false,
    // Light-specific properties
    lightMode: 'point',     // 'point' or 'directional'
    lightRadius: 400,       // point: range; directional: not used
    lightColor: '#fff2dd',
    lightIntensity: 1.8,
    lightDirX: 0.3,         // directional: direction vector (normalized in shader)
    lightDirY: -0.7,
    lightDirZ: 0.5,
  };
  state.elements.push(el);
  selectElement(el.id);
  render();
  return el;
}

function deleteSelected() {
  if (state.selectedIds.size === 0) return;
  pushHistory();
  state.elements = state.elements.filter(e => !state.selectedIds.has(e.id));
  state.selectedIds.clear();
  cleanupEmptyGroups();
  updateProperties();
  render();
}

function copySelected() {
  const selected = state.elements.filter(e => state.selectedIds.has(e.id));
  if (selected.length > 0) state.clipboard = selected.map(e => ({ ...e }));
}

function pasteClipboard() {
  if (!state.clipboard || state.clipboard.length === 0) return;
  pushHistory();
  state.selectedIds.clear();
  state.clipboard.forEach(el => {
    const newEl = {
      id: state.nextId++,
      type: el.type, x: Math.round(el.x + 50), y: Math.round(el.y + 50),
      w: Math.round(el.w || 0), h: Math.round(el.h || 0),
      texId: el.texId || null,
      layer: el.layer != null ? el.layer : parseInt(document.getElementById('selLayer').value),
      tile: !!el.tile,
    };
    if (el.type === 'light') {
      newEl.lightMode = el.lightMode; newEl.lightRadius = el.lightRadius;
      newEl.lightColor = el.lightColor; newEl.lightIntensity = el.lightIntensity;
      newEl.lightDirX = el.lightDirX; newEl.lightDirY = el.lightDirY; newEl.lightDirZ = el.lightDirZ;
    }
    if (el.pick) newEl.pick = true;
    if (el.trap) {
      newEl.trap = true; newEl.trapAnimType = el.trapAnimType; newEl.trapHidden = el.trapHidden;
      newEl.trapCorridor = el.trapCorridor; newEl.trapQuestion = el.trapQuestion; newEl.trapOffset = el.trapOffset ? [...el.trapOffset] : [0,0,0,0];
      newEl.trapTween = el.trapTween ? el.trapTween.map(t => ({...t})) : [];
      newEl.trapTweenDuration = el.trapTweenDuration; newEl.trapTweenEase = el.trapTweenEase;
    }
    if (el.ending) {
      newEl.ending = true; newEl.endingAnimType = el.endingAnimType; newEl.endingHidden = el.endingHidden;
      newEl.endingTween = el.endingTween ? el.endingTween.map(t => ({...t})) : [];
      newEl.endingTweenDuration = el.endingTweenDuration; newEl.endingTweenEase = el.endingTweenEase;
    }
    state.elements.push(newEl);
    state.selectedIds.add(newEl.id);
  });
  updateProperties();
  render();
}

function hideSelected() {
  if (state.selectedIds.size === 0) return;
  pushHistory();
  state.elements.forEach(el => {
    if (state.selectedIds.has(el.id)) el.hidden = true;
  });
  state.selectedIds.clear();
  updateProperties();
  render();
}

function showAll() {
  pushHistory();
  state.elements.forEach(el => { el.hidden = false; });
  render();
}

function bringToTop() {
  if (state.selectedIds.size === 0) return;
  pushHistory();
  const sel = state.elements.filter(e => state.selectedIds.has(e.id));
  const rest = state.elements.filter(e => !state.selectedIds.has(e.id));
  // For each selected element, move it after all non-selected elements in the same layer
  // Rebuild array: for each position, keep non-selected, then insert selected at the end of their layer group
  const result = [];
  const selByLayer = {};
  sel.forEach(e => {
    const l = e.type === 'light' ? 'light' : (e.layer || 0);
    (selByLayer[l] = selByLayer[l] || []).push(e);
  });
  let prevLayer = null;
  rest.forEach((e, i) => {
    const l = e.type === 'light' ? 'light' : (e.layer || 0);
    // When we transition to a new layer (or reach end), flush selected from the previous layer
    if (prevLayer !== null && prevLayer !== l && selByLayer[prevLayer]) {
      result.push(...selByLayer[prevLayer]);
      delete selByLayer[prevLayer];
    }
    result.push(e);
    prevLayer = l;
  });
  // Flush remaining selected (for the last layer and any layers that only had selected elements)
  // First flush the last layer we saw
  if (prevLayer !== null && selByLayer[prevLayer]) {
    result.push(...selByLayer[prevLayer]);
    delete selByLayer[prevLayer];
  }
  // Then any layers that had only selected elements (maintain layer order)
  Object.keys(selByLayer).sort((a, b) => {
    if (a === 'light') return 1;
    if (b === 'light') return -1;
    return a - b;
  }).forEach(l => result.push(...selByLayer[l]));
  state.elements = result;
  render();
}

function pushToBottom() {
  if (state.selectedIds.size === 0) return;
  pushHistory();
  const sel = state.elements.filter(e => state.selectedIds.has(e.id));
  const rest = state.elements.filter(e => !state.selectedIds.has(e.id));
  const result = [];
  const selByLayer = {};
  sel.forEach(e => {
    const l = e.type === 'light' ? 'light' : (e.layer || 0);
    (selByLayer[l] = selByLayer[l] || []).push(e);
  });
  let insertedLayers = new Set();
  rest.forEach(e => {
    const l = e.type === 'light' ? 'light' : (e.layer || 0);
    // Before the first non-selected element of this layer, insert selected ones
    if (!insertedLayers.has(l) && selByLayer[l]) {
      result.push(...selByLayer[l]);
      insertedLayers.add(l);
    }
    result.push(e);
  });
  // Any layers that had only selected elements
  Object.keys(selByLayer).filter(l => !insertedLayers.has(l)).sort((a, b) => {
    if (a === 'light') return 1;
    if (b === 'light') return -1;
    return a - b;
  }).forEach(l => result.push(...selByLayer[l]));
  state.elements = result;
  render();
}

function selectElement(id) {
  state.selectedIds.clear();
  state.primarySelectedId = id;
  if (id != null) state.selectedIds.add(id);
  updateProperties();
}

function toggleSelect(id) {
  if (state.selectedIds.has(id)) state.selectedIds.delete(id);
  else state.selectedIds.add(id);
  updateProperties();
}

function selectAll() {
  state.selectedIds.clear();
  state.elements.forEach(el => { if (!el.hidden) state.selectedIds.add(el.id); });
  updateProperties();
  render();
}

function getSelectedElements() {
  return state.elements.filter(e => state.selectedIds.has(e.id));
}

function alignSelected(mode) {
  const els = getSelectedElements();
  if (els.length < 2) return;
  pushHistory();
  // For lights, treat as w=0, h=0
  const getW = e => e.type === 'light' ? 0 : e.w;
  const getH = e => e.type === 'light' ? 0 : e.h;

  switch (mode) {
    case 'left': {
      const v = Math.min(...els.map(e => e.x));
      els.forEach(e => { e.x = v; });
      break;
    }
    case 'right': {
      const v = Math.max(...els.map(e => e.x + getW(e)));
      els.forEach(e => { e.x = v - getW(e); });
      break;
    }
    case 'top': {
      const v = Math.min(...els.map(e => e.y));
      els.forEach(e => { e.y = v; });
      break;
    }
    case 'bottom': {
      const v = Math.max(...els.map(e => e.y + getH(e)));
      els.forEach(e => { e.y = v - getH(e); });
      break;
    }
    case 'centerH': {
      const minX = Math.min(...els.map(e => e.x));
      const maxR = Math.max(...els.map(e => e.x + getW(e)));
      const cx = (minX + maxR) / 2;
      els.forEach(e => { e.x = Math.round(cx - getW(e) / 2); });
      break;
    }
    case 'centerV': {
      const minY = Math.min(...els.map(e => e.y));
      const maxB = Math.max(...els.map(e => e.y + getH(e)));
      const cy = (minY + maxB) / 2;
      els.forEach(e => { e.y = Math.round(cy - getH(e) / 2); });
      break;
    }
  }
  updateProperties();
  render();
}

function spaceEvenly(axis) {
  const els = getSelectedElements();
  if (els.length < 3) return;
  pushHistory();
  const getW = e => e.type === 'light' ? 0 : e.w;
  const getH = e => e.type === 'light' ? 0 : e.h;

  if (axis === 'horizontal') {
    els.sort((a, b) => a.x - b.x);
    const first = els[0];
    const last = els[els.length - 1];
    const totalSpan = (last.x + getW(last)) - first.x;
    const totalSize = els.reduce((s, e) => s + getW(e), 0);
    const gap = (totalSpan - totalSize) / (els.length - 1);
    let x = first.x;
    els.forEach(e => {
      e.x = Math.round(x);
      x += getW(e) + gap;
    });
  } else {
    els.sort((a, b) => a.y - b.y);
    const first = els[0];
    const last = els[els.length - 1];
    const totalSpan = (last.y + getH(last)) - first.y;
    const totalSize = els.reduce((s, e) => s + getH(e), 0);
    const gap = (totalSpan - totalSize) / (els.length - 1);
    let y = first.y;
    els.forEach(e => {
      e.y = Math.round(y);
      y += getH(e) + gap;
    });
  }
  updateProperties();
  render();
}

function groupSelected() {
  if (state.selectedIds.size < 2) return;
  pushHistory();
  const gid = state.nextGroupId++;
  state.groups[gid] = { name: 'Group ' + gid };
  state.elements.forEach(el => {
    if (state.selectedIds.has(el.id)) el.groupId = gid;
  });
  updateProperties();
  render();
}

function ungroupSelected() {
  const gids = new Set();
  state.elements.forEach(el => {
    if (state.selectedIds.has(el.id) && el.groupId) gids.add(el.groupId);
  });
  if (gids.size === 0) return;
  pushHistory();
  state.elements.forEach(el => {
    if (gids.has(el.groupId)) el.groupId = null;
  });
  gids.forEach(gid => delete state.groups[gid]);
  updateProperties();
  render();
}

/** Expand selection to include all group members of any selected element */
function expandSelectionToGroups() {
  const gids = new Set();
  state.elements.forEach(el => {
    if (state.selectedIds.has(el.id) && el.groupId) gids.add(el.groupId);
  });
  if (gids.size === 0) return;
  state.elements.forEach(el => {
    if (el.groupId && gids.has(el.groupId) && !el.hidden) {
      state.selectedIds.add(el.id);
    }
  });
}

function cleanupEmptyGroups() {
  const usedGids = new Set(state.elements.map(e => e.groupId).filter(Boolean));
  Object.keys(state.groups).forEach(gidStr => {
    if (!usedGids.has(Number(gidStr))) delete state.groups[gidStr];
  });
}

// Persisted across property-panel rebuilds (not part of level data / undo).
let lastGradientStart = '#ffd066';
let lastGradientEnd   = '#1a1040';

function hexToRgb(hex) {
  const h = (hex || '#ffffff').replace('#', '');
  return { r: parseInt(h.substr(0, 2), 16), g: parseInt(h.substr(2, 2), 16), b: parseInt(h.substr(4, 2), 16) };
}
function rgbToHex(r, g, b) {
  return '#' + [r, g, b].map(v => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, '0')).join('');
}
function lerpHex(a, b, t) {
  const ca = hexToRgb(a), cb = hexToRgb(b);
  return rgbToHex(ca.r + (cb.r - ca.r) * t, ca.g + (cb.g - ca.g) * t, ca.b + (cb.b - ca.b) * t);
}
function gradientRefX(el) {
  return el.type === 'light' ? el.x : el.x + (el.w || 0) / 2;
}

/** Duplicate every element in the given group into a brand-new group. Selects the copies. */
function duplicateGroup(gid) {
  const members = state.elements.filter(e => e.groupId === gid);
  if (members.length === 0) return;
  pushHistory();
  const newGid = state.nextGroupId++;
  const oldGroup = state.groups[gid];
  state.groups[newGid] = { name: (oldGroup ? oldGroup.name : 'Group') + ' copy' };

  state.selectedIds.clear();
  state.primarySelectedId = null;
  members.forEach(el => {
    const newEl = {
      id: state.nextId++,
      type: el.type,
      x: Math.round(el.x + 50), y: Math.round(el.y + 50),
      w: el.w || 0, h: el.h || 0,
      texId: el.texId || null,
      layer: el.layer,
      tile: !!el.tile,
      groupId: newGid,
    };
    if (el.tint) newEl.tint = el.tint;
    if (el.flipX) newEl.flipX = true;
    if (el.flipY) newEl.flipY = true;
    if (el.rotation) newEl.rotation = el.rotation;
    if (el.type === 'light') {
      newEl.lightMode = el.lightMode; newEl.lightRadius = el.lightRadius;
      newEl.lightColor = el.lightColor; newEl.lightIntensity = el.lightIntensity;
      newEl.lightDirX = el.lightDirX; newEl.lightDirY = el.lightDirY; newEl.lightDirZ = el.lightDirZ;
    }
    if (el.pick) newEl.pick = true;
    if (el.trap) {
      newEl.trap = true; newEl.trapAnimType = el.trapAnimType; newEl.trapHidden = el.trapHidden;
      newEl.trapCorridor = el.trapCorridor; newEl.trapQuestion = el.trapQuestion; newEl.trapOffset = el.trapOffset ? [...el.trapOffset] : [0,0,0,0];
      newEl.trapTween = el.trapTween ? el.trapTween.map(t => ({...t})) : [];
      newEl.trapTweenDuration = el.trapTweenDuration; newEl.trapTweenEase = el.trapTweenEase;
    }
    if (el.ending) {
      newEl.ending = true; newEl.endingAnimType = el.endingAnimType; newEl.endingHidden = el.endingHidden;
      newEl.endingTween = el.endingTween ? el.endingTween.map(t => ({...t})) : [];
      newEl.endingTweenDuration = el.endingTweenDuration; newEl.endingTweenEase = el.endingTweenEase;
    }
    state.elements.push(newEl);
    state.selectedIds.add(newEl.id);
    if (state.primarySelectedId == null) state.primarySelectedId = newEl.id;
  });
  updateProperties();
  render();
}

/** Apply a left-to-right tint gradient across all members of a group (excluding lights). */
function applyGroupGradient(gid, startHex, endHex) {
  const tintable = state.elements.filter(e => e.groupId === gid && e.type !== 'light');
  if (tintable.length === 0) return;
  pushHistory();
  const xs = tintable.map(gradientRefX);
  const minX = Math.min(...xs);
  const maxX = Math.max(...xs);
  const span = maxX - minX;
  tintable.forEach(e => {
    const t = span > 0 ? (gradientRefX(e) - minX) / span : 0;
    e.tint = lerpHex(startHex, endHex, t);
  });
  updateProperties();
  render();
}

function duplicateSelected() {
  if (state.selectedIds.size === 0) return;
  pushHistory();
  const selected = state.elements.filter(e => state.selectedIds.has(e.id));
  // Map old groupIds to new groupIds for duplicated groups
  const groupMap = {};
  selected.forEach(el => {
    if (el.groupId && !(el.groupId in groupMap)) {
      const newGid = state.nextGroupId++;
      const oldGroup = state.groups[el.groupId];
      state.groups[newGid] = { name: (oldGroup ? oldGroup.name : 'Group') + ' copy' };
      groupMap[el.groupId] = newGid;
    }
  });
  state.selectedIds.clear();
  selected.forEach(el => {
    const newEl = {
      id: state.nextId++,
      type: el.type,
      x: Math.round(el.x + 50), y: Math.round(el.y + 50),
      w: el.w || 0, h: el.h || 0,
      texId: el.texId || null,
      layer: el.layer,
      tile: !!el.tile,
      groupId: el.groupId ? groupMap[el.groupId] : null,
    };
    if (el.type === 'light') {
      newEl.lightMode = el.lightMode; newEl.lightRadius = el.lightRadius;
      newEl.lightColor = el.lightColor; newEl.lightIntensity = el.lightIntensity;
      newEl.lightDirX = el.lightDirX; newEl.lightDirY = el.lightDirY; newEl.lightDirZ = el.lightDirZ;
    }
    if (el.pick) newEl.pick = true;
    if (el.trap) {
      newEl.trap = true; newEl.trapAnimType = el.trapAnimType; newEl.trapHidden = el.trapHidden;
      newEl.trapCorridor = el.trapCorridor; newEl.trapQuestion = el.trapQuestion; newEl.trapOffset = el.trapOffset ? [...el.trapOffset] : [0,0,0,0];
      newEl.trapTween = el.trapTween ? el.trapTween.map(t => ({...t})) : [];
      newEl.trapTweenDuration = el.trapTweenDuration; newEl.trapTweenEase = el.trapTweenEase;
    }
    if (el.ending) {
      newEl.ending = true; newEl.endingAnimType = el.endingAnimType; newEl.endingHidden = el.endingHidden;
      newEl.endingTween = el.endingTween ? el.endingTween.map(t => ({...t})) : [];
      newEl.endingTweenDuration = el.endingTweenDuration; newEl.endingTweenEase = el.endingTweenEase;
    }
    state.elements.push(newEl);
    state.selectedIds.add(newEl.id);
  });
  updateProperties();
  render();
}

function hitTest(wx, wy) {
  // Collect all hits, then return the topmost by render order (layer, lights on top)
  let best = null;
  for (let i = 0; i < state.elements.length; i++) {
    const el = state.elements[i];
    if (el.hidden) continue;
    let hit = false;
    if (el.type === 'light') {
      const dx = wx - el.x, dy = wy - el.y;
      const hitR = Math.max(20 / state.zoom, 20);
      hit = dx * dx + dy * dy <= hitR * hitR;
    } else {
      hit = wx >= el.x && wx <= el.x + el.w && wy >= el.y && wy <= el.y + el.h;
    }
    if (!hit) continue;
    if (!best) { best = el; continue; }
    // Same priority rules as render sort: lights always on top, then higher layer wins,
    // then later array position (last added) wins within same layer
    if (el.type === 'light' && best.type !== 'light') { best = el; }
    else if (el.type !== 'light' && best.type === 'light') { /* keep best */ }
    else if (el.layer > best.layer) { best = el; }
    else if (el.layer === best.layer) { best = el; /* later in array = on top */ }
  }
  return best;
}

function isOnResizeHandle(el, wx, wy) {
  const hs = 10 / state.zoom;
  return wx >= el.x + el.w - hs && wy >= el.y + el.h - hs;
}
