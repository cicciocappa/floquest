      state.selectedIds.add(el.id);
      state.primarySelectedId = el.id;
      updateProperties();
      render();
    };
  }

  // Group-wide property controls (tint, layer, flip)
  if (el.groupId) {
    const grpMembers = state.elements.filter(e => e.groupId === el.groupId);

    // Group layer
    const grpLayerSel = document.getElementById('propGrpLayer');
    if (grpLayerSel) {
      // Show current value if all same, otherwise "(mixed)"
      const layers = new Set(grpMembers.map(e => e.layer));
      if (layers.size === 1) grpLayerSel.value = String([...layers][0]);
      else grpLayerSel.value = '';
      let saved = false;
      const handler = () => {
        if (grpLayerSel.value === '') return;
        if (!saved) { pushHistory(); saved = true; }
        const val = parseInt(grpLayerSel.value);
        grpMembers.forEach(e => { e.layer = val; });
        render();
      };
      grpLayerSel.addEventListener('change', handler);
    }

    // Group tint
    const grpTintInp = document.getElementById('propGrpTint');
    if (grpTintInp) {
      const tints = new Set(grpMembers.map(e => e.tint || '#ffffff'));
      if (tints.size === 1) grpTintInp.value = [...tints][0];
      let saved = false;
      const handler = () => {
        if (!saved) { pushHistory(); saved = true; }
        const val = grpTintInp.value === '#ffffff' ? null : grpTintInp.value;
        grpMembers.forEach(e => { e.tint = val; });
        render();
      };
      grpTintInp.addEventListener('change', handler);
      grpTintInp.addEventListener('input', handler);
    }
    const grpTintReset = document.getElementById('propGrpTintReset');
    if (grpTintReset) {
      grpTintReset.onclick = () => {
        pushHistory();
        grpMembers.forEach(e => { e.tint = null; });
        updateProperties();
        render();
      };
    }

    // Group flip
    const grpFlipX = document.getElementById('propGrpFlipX');
    const grpFlipY = document.getElementById('propGrpFlipY');
    if (grpFlipX) {
      const allFlipX = grpMembers.every(e => e.flipX);
      grpFlipX.checked = allFlipX;
      grpFlipX.indeterminate = !allFlipX && grpMembers.some(e => e.flipX);
      let saved = false;
      grpFlipX.addEventListener('change', () => {
        if (!saved) { pushHistory(); saved = true; }
        grpMembers.forEach(e => { e.flipX = grpFlipX.checked; });
        render();
      });
    }
    if (grpFlipY) {
      const allFlipY = grpMembers.every(e => e.flipY);
      grpFlipY.checked = allFlipY;
      grpFlipY.indeterminate = !allFlipY && grpMembers.some(e => e.flipY);
      let saved = false;
      grpFlipY.addEventListener('change', () => {
        if (!saved) { pushHistory(); saved = true; }
        grpMembers.forEach(e => { e.flipY = grpFlipY.checked; });
        render();
      });
    }

    // Group gradient
    const grpGradStart = document.getElementById('propGrpGradStart');
    const grpGradEnd = document.getElementById('propGrpGradEnd');
    const grpGradSet = document.getElementById('propGrpGradSet');
    if (grpGradStart) {
      grpGradStart.addEventListener('input', () => { lastGradientStart = grpGradStart.value; });
      grpGradStart.addEventListener('change', () => { lastGradientStart = grpGradStart.value; });
    }
    if (grpGradEnd) {
      grpGradEnd.addEventListener('input', () => { lastGradientEnd = grpGradEnd.value; });
      grpGradEnd.addEventListener('change', () => { lastGradientEnd = grpGradEnd.value; });
    }
    if (grpGradSet) {
      grpGradSet.onclick = () => {
        applyGroupGradient(el.groupId, lastGradientStart, lastGradientEnd);
      };
    }

    // Duplicate group
    const grpDup = document.getElementById('propGrpDup');
    if (grpDup) {
      grpDup.onclick = () => duplicateGroup(el.groupId);
    }
  }

  // Add to group button (for ungrouped elements)
  const addToGrpBtn = document.getElementById('propAddToGroup');
  const addToGrpSel = document.getElementById('propAddToGroupSel');
  if (addToGrpBtn && addToGrpSel) {
    addToGrpBtn.onclick = () => {
      const gid = parseInt(addToGrpSel.value);
      if (!gid || !state.groups[gid]) return;
      pushHistory();
      el.groupId = gid;
      // Expand selection to include new group
      expandSelectionToGroups();
      updateProperties();
      render();
    };
  }

  // Bind changes
  const bind = (id, prop, parse) => {
    const inp = document.getElementById(id);
    if (!inp) return;
    let historySaved = false;
    const saveOnce = () => { if (!historySaved) { pushHistory(); historySaved = true; } };
    inp.addEventListener('focus', saveOnce);
    inp.addEventListener('mousedown', saveOnce); // for checkboxes/color pickers
    inp.addEventListener('change', () => {
      saveOnce();
      el[prop] = parse ? parse(inp) : inp.value;
      render();
    });
    inp.addEventListener('input', () => {
      saveOnce();
      el[prop] = parse ? parse(inp) : inp.value;
      render();
    });
  };
  bind('propX', 'x', inp => parseInt(inp.value));
  bind('propY', 'y', inp => parseInt(inp.value));
  bind('propW', 'w', inp => Math.max(1, parseInt(inp.value)));
  bind('propH', 'h', inp => Math.max(1, parseInt(inp.value)));
  bind('propLayer', 'layer', inp => parseInt(inp.value));
  bind('propTile', 'tile', inp => inp.checked);
  bind('propPick', 'pick', inp => inp.checked || false);
  bind('propTint', 'tint', inp => inp.value === '#ffffff' ? null : inp.value);
  bind('propFlipX', 'flipX', inp => inp.checked || false);
  bind('propFlipY', 'flipY', inp => inp.checked || false);
  bind('propRot', 'rotation', inp => parseFloat(inp.value) || 0);
  bind('propTex', 'texId', inp => inp.value || null);
  const tintResetBtn = document.getElementById('propTintReset');
  if (tintResetBtn) {
    tintResetBtn.onclick = () => { el.tint = null; updateProperties(); render(); };
  }

  // Reset size to original texture dimensions
  const resetBtn = document.getElementById('propResetSize');
  if (resetBtn) {
    resetBtn.onclick = () => {
      const tex = state.textures[el.texId];
      if (tex) {
        el.w = tex.frameWidth || tex.w;
        el.h = tex.frameHeight || tex.h;
        updateProperties();
        render();
      }
    };
  }
  // Light properties
  bind('propLR', 'lightRadius', inp => Math.max(10, parseInt(inp.value)));
  bind('propLC', 'lightColor', inp => inp.value);
  bind('propLI', 'lightIntensity', inp => Math.max(0, parseFloat(inp.value)));
  bind('propLDX', 'lightDirX', inp => parseFloat(inp.value));
  bind('propLDY', 'lightDirY', inp => parseFloat(inp.value));
  bind('propLDZ', 'lightDirZ', inp => parseFloat(inp.value));

  // Light mode switch — rebuild properties panel when changed
  const modeSel = document.getElementById('propLMode');
  if (modeSel) {
    modeSel.addEventListener('change', () => {
      el.lightMode = modeSel.value;
      updateProperties(); // rebuild to show/hide relevant fields
      render();
    });
  }

  // --- Trap properties ---
  const trapCheck = document.getElementById('propTrap');
  if (trapCheck) {
    trapCheck.addEventListener('change', () => {
      pushHistory();
      el.trap = trapCheck.checked;
      if (el.trap && !el.trapOffset) el.trapOffset = [0, 0, 0, 0];
      if (el.trap && !el.trapTween) el.trapTween = [];
      document.getElementById('trapDetails').style.display = el.trap ? 'block' : 'none';
    });
  }
  bind('propTrapHidden', 'trapHidden', inp => inp.checked);
  bind('propTrapCorridor', 'trapCorridor', inp => Math.min(4, Math.max(0, parseInt(inp.value) || 0)));
  bind('propTrapQuestion', 'trapQuestion', inp => Math.min(10, Math.max(0, parseInt(inp.value) || 0)));
  bind('propTrapTweenDur', 'trapTweenDuration', inp => Math.max(1, parseInt(inp.value) || 500));
  bind('propTrapTweenEase', 'trapTweenEase');

  // Trap anim type switch
  const trapAnimSel = document.getElementById('propTrapAnimType');
  if (trapAnimSel) {
    trapAnimSel.addEventListener('change', () => {
      pushHistory();
      el.trapAnimType = trapAnimSel.value;
      document.getElementById('trapTweenDetails').style.display = el.trapAnimType === 'tween' ? 'block' : 'none';
    });
  }

  // Trap offset inputs (4 values, one per corridor)
  document.querySelectorAll('.trapOffsetInput').forEach(inp => {
    let saved = false;
    const handler = () => {
      if (!saved) { pushHistory(); saved = true; }
      if (!el.trapOffset) el.trapOffset = [0, 0, 0, 0];
      el.trapOffset[parseInt(inp.dataset.idx)] = Math.max(0, parseInt(inp.value) || 0);
    };
    inp.addEventListener('change', handler);
    inp.addEventListener('input', handler);
  });

  // Tween property list
  const tweenListEl = document.getElementById('trapTweenList');
  const btnAddTween = document.getElementById('btnAddTween');

  function renderTweenList() {
    if (!tweenListEl) return;
    if (!el.trapTween) el.trapTween = [];
    tweenListEl.innerHTML = '';
    el.trapTween.forEach((tw, i) => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:3px;margin-bottom:3px;';
      row.innerHTML = `
        <select class="twProp" data-i="${i}" style="width:55px;background:#0a0a1a;color:#aac;border:1px solid #1a4080;padding:1px 2px;font-size:11px;border-radius:2px;">
          ${['x','y','alpha','scaleX','scaleY','rotation'].map(p =>
            `<option value="${p}" ${tw.prop===p?'selected':''}>${p}</option>`
          ).join('')}
        </select>
        <input type="number" class="twFrom" data-i="${i}" value="${tw.from!=null?tw.from:0}" step="any" style="width:42px;background:#0a0a1a;color:#aac;border:1px solid #1a4080;padding:1px 2px;font-size:11px;border-radius:2px;" title="From">
        <span style="color:#556;font-size:10px;">\u2192</span>
        <input type="number" class="twTo" data-i="${i}" value="${tw.to!=null?tw.to:0}" step="any" style="width:42px;background:#0a0a1a;color:#aac;border:1px solid #1a4080;padding:1px 2px;font-size:11px;border-radius:2px;" title="To">
        <button class="twDel" data-i="${i}" style="background:#622;color:#c88;border:1px solid #844;padding:0 4px;font-size:11px;cursor:pointer;border-radius:2px;" title="Remove">\u00d7</button>
      `;
      tweenListEl.appendChild(row);
    });

    // Bind tween row inputs
    tweenListEl.querySelectorAll('.twProp').forEach(sel => {
      sel.addEventListener('change', () => {
        pushHistory();
        el.trapTween[parseInt(sel.dataset.i)].prop = sel.value;
      });
    });
    tweenListEl.querySelectorAll('.twFrom').forEach(inp => {
      inp.addEventListener('change', () => {
        pushHistory();
        el.trapTween[parseInt(inp.dataset.i)].from = parseFloat(inp.value) || 0;
      });
    });
    tweenListEl.querySelectorAll('.twTo').forEach(inp => {
      inp.addEventListener('change', () => {
        pushHistory();
        el.trapTween[parseInt(inp.dataset.i)].to = parseFloat(inp.value) || 0;
      });
    });
    tweenListEl.querySelectorAll('.twDel').forEach(btn => {
      btn.addEventListener('click', () => {
        pushHistory();
        el.trapTween.splice(parseInt(btn.dataset.i), 1);
        renderTweenList();
      });
    });
  }

  if (btnAddTween) {
    btnAddTween.addEventListener('click', () => {
      pushHistory();
      if (!el.trapTween) el.trapTween = [];
      el.trapTween.push({ prop: 'y', from: 0, to: 0 });
      renderTweenList();
    });
  }
  renderTweenList();

  // --- Ending properties ---
  const endingCheck = document.getElementById('propEnding');
  if (endingCheck) {
    endingCheck.addEventListener('change', () => {
      pushHistory();
      el.ending = endingCheck.checked;
      if (el.ending && !el.endingTween) el.endingTween = [];
      document.getElementById('endingDetails').style.display = el.ending ? 'block' : 'none';
      render();
    });
  }
  bind('propEndingHidden', 'endingHidden', inp => inp.checked);
  bind('propEndingTweenDur', 'endingTweenDuration', inp => Math.max(1, parseInt(inp.value) || 500));
  bind('propEndingTweenEase', 'endingTweenEase');

  const endingAnimSel = document.getElementById('propEndingAnimType');
  if (endingAnimSel) {
    endingAnimSel.addEventListener('change', () => {
      pushHistory();
      el.endingAnimType = endingAnimSel.value;
      document.getElementById('endingTweenDetails').style.display = el.endingAnimType === 'tween' ? 'block' : 'none';
    });
  }

  const endingTweenListEl = document.getElementById('endingTweenList');
  const btnAddEndingTween = document.getElementById('btnAddEndingTween');
  function renderEndingTweenList() {
    if (!endingTweenListEl) return;
    if (!el.endingTween) el.endingTween = [];
    endingTweenListEl.innerHTML = '';
    el.endingTween.forEach((tw, i) => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;gap:2px;margin-top:2px;align-items:center;';
      row.innerHTML = `
        <select class="endingTwProp" data-i="${i}" style="width:55px;font-size:10px;">
          ${['x','y','alpha','angle','scaleX','scaleY','rotation'].map(p => `<option value="${p}" ${tw.prop===p?'selected':''}>${p}</option>`).join('')}
        </select>
        <input type="number" class="endingTwFrom" data-i="${i}" value="${tw.from||0}" step="0.1" style="width:48px;font-size:10px;" title="from">
        <input type="number" class="endingTwTo" data-i="${i}" value="${tw.to||0}" step="0.1" style="width:48px;font-size:10px;" title="to">
        <button class="endingTwDel" data-i="${i}" style="background:#800;color:#fff;border:none;padding:2px 4px;font-size:10px;cursor:pointer;border-radius:2px;">×</button>
      `;
      endingTweenListEl.appendChild(row);
    });
    endingTweenListEl.querySelectorAll('.endingTwProp').forEach(sel => {
      sel.addEventListener('change', () => {
        pushHistory();
        el.endingTween[parseInt(sel.dataset.i)].prop = sel.value;
      });
    });
    endingTweenListEl.querySelectorAll('.endingTwFrom').forEach(inp => {
      inp.addEventListener('change', () => {
        pushHistory();
        el.endingTween[parseInt(inp.dataset.i)].from = parseFloat(inp.value) || 0;
      });
    });
    endingTweenListEl.querySelectorAll('.endingTwTo').forEach(inp => {
      inp.addEventListener('change', () => {
        pushHistory();
        el.endingTween[parseInt(inp.dataset.i)].to = parseFloat(inp.value) || 0;
      });
    });
    endingTweenListEl.querySelectorAll('.endingTwDel').forEach(btn => {
      btn.addEventListener('click', () => {
        pushHistory();
        el.endingTween.splice(parseInt(btn.dataset.i), 1);
        renderEndingTweenList();
      });
    });
  }

  if (btnAddEndingTween) {
    btnAddEndingTween.addEventListener('click', () => {
      pushHistory();
      if (!el.endingTween) el.endingTween = [];
      el.endingTween.push({ prop: 'y', from: 0, to: 0 });
      renderEndingTweenList();
    });
  }
  renderEndingTweenList();
}

// =====================================================================
// TEXTURE MANAGEMENT
// =====================================================================
function addTexture(file) {
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const name = file.name.replace(/\.[^.]+$/, '');
      // Use name as texId (no timestamp) so catalog references are stable
      const texId = name;
      state.textures[texId] = {
        img, name,
        path: file.name,  // filename for catalog (assumes img/bg/)
        w: img.naturalWidth, h: img.naturalHeight
      };
      refreshTexList();
      state.selectedTexId = texId;
      render();
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

function refreshTexList() {
  const list = document.getElementById('texList');
  list.innerHTML = '';
  Object.entries(state.textures).forEach(([id, tex]) => {
    const div = document.createElement('div');
    div.className = 'tex-item' + (id === state.selectedTexId ? ' selected' : '');
    div.onclick = () => {
      state.selectedTexId = id;
      refreshTexList();
    };
    div.ondblclick = (e) => {
      e.stopPropagation();
      reloadTexture(id);
    };

    const preview = document.createElement('canvas');
    preview.width = 32; preview.height = 32;
    const pc = preview.getContext('2d');
    const fw = tex.frameWidth || tex.w, fh = tex.frameHeight || tex.h;
    const s = Math.min(32 / fw, 32 / fh);
    pc.drawImage(tex.img, 0, 0, fw, fh, (32 - fw * s) / 2, (32 - fh * s) / 2, fw * s, fh * s);

    const span = document.createElement('span');
    const label = tex.frameWidth ? '\u25B6 ' + tex.name : tex.name;
    span.textContent = label + ' (' + tex.w + 'x' + tex.h + ')';

    div.appendChild(preview);
    div.appendChild(span);
    list.appendChild(div);
  });
  updateTexAnimPanel();
}

function updateTexAnimPanel() {
  const panel = document.getElementById('texAnimProps');
  const tex = state.selectedTexId ? state.textures[state.selectedTexId] : null;
  if (!tex) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  const fwInp = document.getElementById('texFW');
  const fhInp = document.getElementById('texFH');
  const fpsInp = document.getElementById('texFPS');
  const countSpan = document.getElementById('texFrameCount');
  fwInp.value = tex.frameWidth || '';
  fhInp.value = tex.frameHeight || '';
  fpsInp.value = tex.frameRate || 10;
  if (tex.frameWidth && tex.frameHeight) {
    const cols = Math.floor(tex.w / tex.frameWidth);
    const rows = Math.floor(tex.h / tex.frameHeight);
    countSpan.textContent = cols * rows;
  } else {
    countSpan.textContent = '—';
  }
  fwInp.onchange = () => {
    const v = parseInt(fwInp.value);
    if (v > 0) tex.frameWidth = v; else delete tex.frameWidth;
    pushHistory(); updateTexAnimPanel(); refreshTexList(); render();
  };
  fhInp.onchange = () => {
    const v = parseInt(fhInp.value);
    if (v > 0) tex.frameHeight = v; else delete tex.frameHeight;
    pushHistory(); updateTexAnimPanel(); refreshTexList(); render();
  };
  fpsInp.onchange = () => {
    tex.frameRate = Math.max(1, parseInt(fpsInp.value) || 10);
    pushHistory(); updateTexAnimPanel();
  };
}

function reloadTexture(texId) {
  const tex = state.textures[texId];
  if (!tex || !tex.path) return;
  const url = TEX_BASE_PATH + tex.path + '?t=' + Date.now();
  const img = new Image();
  img.onload = () => {
    tex.img = img;
    tex.w = img.naturalWidth;
    tex.h = img.naturalHeight;
    refreshTexList();
    render();
    document.getElementById('statusLeft').textContent = 'Reloaded: ' + tex.name;
  };
  img.onerror = () => {
    document.getElementById('statusLeft').textContent = 'Reload failed: ' + tex.name;
  };
  img.src = url;
}

function reloadAllTextures() {
  const ids = Object.keys(state.textures).filter(id => state.textures[id].path);
  if (ids.length === 0) return;
  let done = 0;
  document.getElementById('statusLeft').textContent = 'Reloading textures...';
  ids.forEach(id => {
    const tex = state.textures[id];
    const url = TEX_BASE_PATH + tex.path + '?t=' + Date.now();
    const img = new Image();
    img.onload = () => {
      tex.img = img;
      tex.w = img.naturalWidth;
      tex.h = img.naturalHeight;
      done++;
      if (done === ids.length) {
        refreshTexList();
        render();
        document.getElementById('statusLeft').textContent = 'Reloaded ' + done + ' textures';
      }
    };
    img.onerror = () => {
      done++;
      if (done === ids.length) { refreshTexList(); render(); }
    };
    img.src = url;
  });
}

// =====================================================================
// INPUT HANDLING
// =====================================================================
let isPanning = false;
let panStart = { x: 0, y: 0, panX: 0, panY: 0 };

viewport.addEventListener('mousedown', (e) => {
  const rect = cvs.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const w = screenToWorld(sx, sy);

  // Middle button or space+click = pan
  if (e.button === 1 || (e.button === 0 && e.altKey)) {
    isPanning = true;
    panStart = { x: e.clientX, y: e.clientY, panX: state.panX, panY: state.panY };
    cvs.style.cursor = 'grabbing';
    e.preventDefault();
    return;
  }

  if (e.button !== 0) return;

  if (state.tool === 'select') {
    // Check resize handle for single selection
    if (state.selectedIds.size === 1) {
      const sel = state.elements.find(el => state.selectedIds.has(el.id));
      if (sel && sel.type !== 'light' && isOnResizeHandle(sel, w.x, w.y)) {
        pushHistory();
        state.dragging = {
          mode: 'resize', el: sel,
          startX: w.x, startY: w.y,
          origW: sel.w, origH: sel.h,
        };
        return;
      }
    }

    const hit = hitTest(w.x, w.y);
    if (hit) {
      if (e.shiftKey) {
        // Shift+click: toggle individual element, ignore groups
        toggleSelect(hit.id);
      } else if (!state.selectedIds.has(hit.id)) {
        // Select element + expand to its group
        selectElement(hit.id);
        expandSelectionToGroups();
      } else if (state.primarySelectedId !== hit.id) {
        // Clicked a different element within the same group selection — switch primary
        state.primarySelectedId = hit.id;
        updateProperties();
      }
      // Start multi-drag for all selected
      pushHistory();
      state.dragging = {
        mode: 'move',
        startX: w.x, startY: w.y,
        origPositions: state.elements
          .filter(el => state.selectedIds.has(el.id))
          .map(el => ({ id: el.id, x: el.x, y: el.y })),
      };
    } else {
      if (!e.shiftKey) selectElement(null);
      // Start rubber-band box selection
      state.rubberBand = { x: w.x, y: w.y, w: 0, h: 0 };
    }
    render();

  } else if (state.tool === 'rect') {
    state.drawStart = { x: w.x, y: w.y, w: 0, h: 0 };

  } else if (state.tool === 'sprite') {
    if (state.selectedTexId) {
      const tex = state.textures[state.selectedTexId];
      const sw = tex.frameWidth || tex.w, sh = tex.frameHeight || tex.h;
      addElement('sprite', w.x - sw / 2, w.y - sh / 2, sw, sh, state.selectedTexId,
        parseInt(document.getElementById('selLayer').value), false);
    }

  } else if (state.tool === 'light') {
    addLight(w.x, w.y);
  }
});

viewport.addEventListener('mousemove', (e) => {
  const rect = cvs.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const w = screenToWorld(sx, sy);

  if (isPanning) {
    const dx = (e.clientX - panStart.x) / state.zoom;
    const dy = (e.clientY - panStart.y) / state.zoom;
    state.panX = panStart.panX - dx;
    state.panY = panStart.panY - dy;
    render();
    return;
  }

  if (state.dragging) {
    const d = state.dragging;
    if (d.mode === 'move') {
      const dx = w.x - d.startX;
      const dy = w.y - d.startY;
      d.origPositions.forEach(op => {
        const el = state.elements.find(e => e.id === op.id);
        if (el) {
          el.x = Math.round(op.x + dx);
          el.y = Math.round(op.y + dy);
        }
      });
    } else if (d.mode === 'resize') {
      d.el.w = Math.max(8, Math.round(d.origW + (w.x - d.startX)));
      d.el.h = Math.max(8, Math.round(d.origH + (w.y - d.startY)));
    }
    updateProperties();
    render();
    return;
  }

  // Rubber-band selection
  if (state.rubberBand) {
    state.rubberBand.w = w.x - state.rubberBand.x;
    state.rubberBand.h = w.y - state.rubberBand.y;
    render();
    return;
  }

  if (state.tool === 'rect' && state.drawStart) {
    state.drawStart.w = w.x - state.drawStart.x;
    state.drawStart.h = w.y - state.drawStart.y;
    render();
  }

  // Cursor
  if (state.tool === 'select') {
    if (state.selectedIds.size === 1) {
      const sel = state.elements.find(el => state.selectedIds.has(el.id));
      if (sel && sel.type !== 'light' && isOnResizeHandle(sel, w.x, w.y)) {
        cvs.style.cursor = 'se-resize';
        return;
      }
    }
    if (hitTest(w.x, w.y)) {
      cvs.style.cursor = 'move';
    } else {
      cvs.style.cursor = 'default';
    }
  }
});

viewport.addEventListener('mouseup', (e) => {
  if (isPanning) {
    isPanning = false;
    cvs.style.cursor = 'default';
    return;
  }

  if (state.dragging) {
    state.dragging = null;
    return;
  }

  // Finish rubber-band selection
  if (state.rubberBand) {
    const rb = state.rubberBand;
    const rx = Math.min(rb.x, rb.x + rb.w);
    const ry = Math.min(rb.y, rb.y + rb.h);
    const rw = Math.abs(rb.w);
    const rh = Math.abs(rb.h);
    state.rubberBand = null;
    if (rw > 4 || rh > 4) {
      if (!e.shiftKey) state.selectedIds.clear();
      state.elements.forEach(el => {
        if (el.hidden) return;
        if (el.type === 'light') {
          if (el.x >= rx && el.x <= rx + rw && el.y >= ry && el.y <= ry + rh) {
            state.selectedIds.add(el.id);
          }
        } else {
          // Element intersects box
          if (el.x + el.w > rx && el.x < rx + rw && el.y + el.h > ry && el.y < ry + rh) {
            state.selectedIds.add(el.id);
          }
        }
      });
      expandSelectionToGroups();
      updateProperties();
    }
    render();
    return;
  }

  if (state.tool === 'rect' && state.drawStart) {
    const ds = state.drawStart;
    let x = ds.x, y = ds.y, w = ds.w || 0, h = ds.h || 0;
    if (w < 0) { x += w; w = -w; }
    if (h < 0) { y += h; h = -h; }
    if (w > 4 && h > 4) {
      addElement('rect', x, y, w, h, state.selectedTexId,
        parseInt(document.getElementById('selLayer').value), true);
    }
    state.drawStart = null;
    render();
  }
});

// Zoom
viewport.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = cvs.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;

  // World pos under cursor before zoom
  const before = screenToWorld(sx, sy);

  const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
  state.zoom = Math.max(0.02, Math.min(4, state.zoom * factor));

  // Adjust pan so the same world point stays under cursor
  const after = screenToWorld(sx, sy);
  state.panX -= (after.x - before.x);
  state.panY -= (after.y - before.y);

  render();
}, { passive: false });

// Minimap click to pan
document.getElementById('minimap').addEventListener('mousedown', (e) => {
  const rect = minimapCvs.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const scale = minimapCvs.width / CANVAS_W;
  const viewW = cvs.width / state.zoom;
  state.panX = (mx / scale) - viewW / 2;
  state.panY = 0;
  render();
});

// Keyboard
document.addEventListener('keydown', (e) => {
  // Don't handle if typing in input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

  if (e.key === 'v' || e.key === 'V') setTool('select');
  if (e.key === 'r' || e.key === 'R') setTool('rect');
  if (e.key === 's' || e.key === 'S') setTool('sprite');
  if (e.key === 'l' || e.key === 'L') setTool('light');
  if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
  if (e.key === 'h' || e.key === 'H') hideSelected();
  if (e.ctrlKey && e.shiftKey && (e.key === 'g' || e.key === 'G')) { ungroupSelected(); e.preventDefault(); }
  else if (e.ctrlKey && (e.key === 'g' || e.key === 'G')) { groupSelected(); e.preventDefault(); }
  else if (!e.ctrlKey && (e.key === 'g' || e.key === 'G')) { state.showGuides = !state.showGuides; updateGuideBtn(); render(); }
  if (e.ctrlKey && (e.key === 'd' || e.key === 'D')) { duplicateSelected(); e.preventDefault(); }
  if (e.ctrlKey && !e.shiftKey && e.key === 'z') { undo(); e.preventDefault(); }
  if (e.ctrlKey && e.shiftKey && e.key === 'Z') { redo(); e.preventDefault(); }
  if (e.ctrlKey && e.key === 'c') { copySelected(); e.preventDefault(); }
  if (e.ctrlKey && e.key === 'v') { pasteClipboard(); e.preventDefault(); }
  if (e.ctrlKey && e.key === 'a') {
    e.preventDefault();
    selectAll();
  }
  if (e.key === ']') { bringToTop(); }
  if (e.key === '[') { pushToBottom(); }
  if (e.key === 'F5') {
    e.preventDefault();
    document.getElementById('btnPreview').click();
  }
  if (e.key === 'Escape') {
    state.selectedIds.clear();
    state.drawStart = null;
    updateProperties();
    render();
  }
});

// =====================================================================
// TOOLBAR BINDINGS
// =====================================================================
function setTool(t) {
  state.tool = t;
  document.getElementById('btnSelect').classList.toggle('active', t === 'select');
  document.getElementById('btnRect').classList.toggle('active', t === 'rect');
  document.getElementById('btnSprite').classList.toggle('active', t === 'sprite');
  document.getElementById('btnLight').classList.toggle('active', t === 'light');
  cvs.style.cursor = t === 'select' ? 'default' : 'crosshair';
}

function updateGuideBtn() {
  document.getElementById('btnGuides').classList.toggle('active', state.showGuides);
}


document.getElementById('btnSelect').onclick = () => setTool('select');
document.getElementById('btnRect').onclick = () => setTool('rect');
document.getElementById('btnSprite').onclick = () => setTool('sprite');
document.getElementById('btnLight').onclick = () => setTool('light');
document.getElementById('btnCopy').onclick = copySelected;
document.getElementById('btnPaste').onclick = pasteClipboard;
document.getElementById('btnDelete').onclick = deleteSelected;
document.getElementById('btnHide').onclick = hideSelected;
document.getElementById('btnShowAll').onclick = showAll;
document.getElementById('btnToTop').onclick = bringToTop;
document.getElementById('btnToBottom').onclick = pushToBottom;
document.getElementById('btnGuides').onclick = () => {
  state.showGuides = !state.showGuides;
  updateGuideBtn();
  render();
};

document.getElementById('inpSkyH').addEventListener('change', (e) => {
  pushHistory();
  state.skyHeight = parseInt(e.target.value) || 0;
  render();
});

// Texture drop / file input
const texDrop = document.getElementById('texDropZone');
const texInput = document.getElementById('texFileInput');

texDrop.addEventListener('click', () => texInput.click());
texDrop.addEventListener('dragover', e => { e.preventDefault(); texDrop.style.borderColor = '#5a8aff'; });
texDrop.addEventListener('dragleave', () => { texDrop.style.borderColor = '#1a2a4a'; });
texDrop.addEventListener('drop', e => {
  e.preventDefault();
  texDrop.style.borderColor = '#1a2a4a';
  [...e.dataTransfer.files].forEach(addTexture);
});
texInput.addEventListener('change', () => {
  [...texInput.files].forEach(addTexture);
  texInput.value = '';
});

// =====================================================================
// EXPORT / IMPORT
// =====================================================================
function buildLevelData() {
  return {
    skyHeight: state.skyHeight,
    lighting: {
      ambientColor: state.ambientColor,
      lightMultiplier: state.lightMultiplier,
      playerLight: state.playerLight,
      playerLightIntensity: state.playerLightIntensity,
      playerLightRadius: state.playerLightRadius,
      playerLightColor: state.playerLightColor,
    },
    elements: state.elements.map(el => {
      const out = {
        id: el.id, type: el.type,
        x: el.x, y: el.y,
      };
      if (el.groupId) out.groupId = el.groupId;
      if (el.type === 'light') {
        out.lightMode = el.lightMode;
        out.lightColor = el.lightColor;
        out.lightIntensity = el.lightIntensity;
        if (el.lightMode === 'directional') {
          out.lightDirX = el.lightDirX;
          out.lightDirY = el.lightDirY;
          out.lightDirZ = el.lightDirZ;
        } else {
          out.lightRadius = el.lightRadius;
        }
      } else {
        out.w = el.w; out.h = el.h;
        out.texId = el.texId; out.layer = el.layer; out.tile = el.tile;
        if (el.tint) out.tint = el.tint;
        if (el.flipX) out.flipX = true;
        if (el.flipY) out.flipY = true;
        if (el.rotation) out.rotation = el.rotation;
        if (el.pick) out.pick = true;
        if (el.ending) {
          out.ending = true;
          out.endingAnimType = el.endingAnimType || 'frames';
          out.endingHidden = el.endingHidden !== false;
          if (el.endingAnimType === 'tween') {
            out.endingTween = el.endingTween || [];
            out.endingTweenDuration = el.endingTweenDuration || 500;
            out.endingTweenEase = el.endingTweenEase || 'Linear';
          }
        }
        if (el.trap) {
          out.trap = true;
          out.trapAnimType = el.trapAnimType || 'frames';
          out.trapHidden = el.trapHidden !== false;
          out.trapCorridor = el.trapCorridor != null ? el.trapCorridor : 4;
          out.trapQuestion = el.trapQuestion != null ? el.trapQuestion : 0;
          out.trapOffset = el.trapOffset || [0, 0, 0, 0];
          if (el.trapAnimType === 'tween') {
            out.trapTween = el.trapTween || [];
            out.trapTweenDuration = el.trapTweenDuration || 500;
            out.trapTweenEase = el.trapTweenEase || 'Linear';
          }
        }
      }
      return out;
    }),
    groups: state.groups,
    textures: Object.fromEntries(
      Object.entries(state.textures).map(([id, t]) => {
        const out = { name: t.name, w: t.w, h: t.h };
        if (t.frameWidth) { out.frameWidth = t.frameWidth; out.frameHeight = t.frameHeight; out.frameRate = t.frameRate || 10; }
        return [id, out];
      })
    ),
  };
}

document.getElementById('btnPreview').onclick = () => {
  localStorage.setItem('_floquest_preview', JSON.stringify(buildLevelData()));
  window.open('level_preview.html', '_blank');
};

document.getElementById('btnExport').onclick = () => {
  const data = buildLevelData();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'level_layout.json';
  a.click();
};

document.getElementById('btnImport').onclick = () => {
  document.getElementById('fileImport').click();
};
document.getElementById('fileImport').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      pushHistory();
      state.skyHeight = data.skyHeight || 224;
      document.getElementById('inpSkyH').value = state.skyHeight;
      var lt = data.lighting || {};
      state.ambientColor = lt.ambientColor || '#0a0a10';
      state.lightMultiplier = lt.lightMultiplier != null ? lt.lightMultiplier : 1.0;
      state.playerLight = !!lt.playerLight;
      state.playerLightIntensity = lt.playerLightIntensity || 1.0;
      state.playerLightRadius = lt.playerLightRadius || 400;
      state.playerLightColor = lt.playerLightColor || '#fff2dd';
      state.elements = data.elements || [];
      state.groups = data.groups || {};
      state.nextId = Math.max(1, ...state.elements.map(e => e.id)) + 1;
      const groupIds = state.elements.map(e => e.groupId || 0);
      state.nextGroupId = Math.max(1, ...groupIds) + 1;
      state.selectedIds.clear();
      updateProperties();
      render();
    } catch (err) {
      alert('Invalid JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

document.getElementById('btnSaveTex').onclick = saveTextureCatalog;
document.getElementById('btnReloadTex').onclick = reloadAllTextures;

// =====================================================================
// TEXTURE CATALOG — load from JSON, save with File System Access API
// =====================================================================

/** Load texture catalog from JSON, then load each image */
function loadTextureCatalog() {
  document.getElementById('statusLeft').textContent = 'Loading texture catalog...';

  fetch(TEX_CATALOG_URL)
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(catalog => {
      if (!Array.isArray(catalog) || catalog.length === 0) {
        document.getElementById('statusLeft').textContent = 'No textures in catalog';
        return;
      }
      let loaded = 0;
      const total = catalog.length;

      catalog.forEach(entry => {
        const img = new Image();
        img.onload = () => {
          const texId = entry.name;
          const texData = { img, name: entry.name, path: entry.path, w: img.naturalWidth, h: img.naturalHeight };
          if (entry.frameWidth) { texData.frameWidth = entry.frameWidth; texData.frameHeight = entry.frameHeight; texData.frameRate = entry.frameRate || 10; }
          state.textures[texId] = texData;
          loaded++;
          document.getElementById('statusLeft').textContent = `Loaded ${loaded}/${total}: ${entry.name}`;
          if (loaded === total) {
            refreshTexList();
            render();
            document.getElementById('statusLeft').textContent = `${total} textures loaded`;
          }
        };
        img.onerror = () => {
          loaded++;
          console.warn('Failed to load texture:', entry.path);
          if (loaded === total) { refreshTexList(); render(); }
        };
        img.src = TEX_BASE_PATH + entry.path;
      });
    })
    .catch(err => {
      console.warn('Could not load texture catalog:', err);
      document.getElementById('statusLeft').textContent = 'No texture catalog found';
    });
}

/** Build catalog array from current textures */
function buildCatalog() {
  return Object.values(state.textures).map(tex => {
    const out = { name: tex.name, path: tex.path || tex.name + '.png' };
    if (tex.frameWidth) { out.frameWidth = tex.frameWidth; out.frameHeight = tex.frameHeight; out.frameRate = tex.frameRate || 10; }
    return out;
  });
}

/** Save catalog using File System Access API */
async function saveTextureCatalog() {
  if (!window.showSaveFilePicker) {
    alert('File System Access API not supported in this browser. Use Chrome or Edge.');
    return;
  }

  const catalog = buildCatalog();
  const json = JSON.stringify(catalog, null, 2) + '\n';

  try {
    // Reuse handle if we have one, otherwise prompt
    if (!texCatalogHandle) {
      texCatalogHandle = await window.showSaveFilePicker({
        suggestedName: 'textures.json',
        types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
      });
    }
    const writable = await texCatalogHandle.createWritable();
    await writable.write(json);
    await writable.close();
    document.getElementById('statusLeft').textContent = `Texture catalog saved (${catalog.length} textures)`;
  } catch (err) {
    if (err.name !== 'AbortError') {
      console.error('Save failed:', err);
      alert('Save failed: ' + err.message);
    }
  }
}

// =====================================================================
// INIT
// =====================================================================
window.addEventListener('resize', resize);
resize();

// Center view vertically, start at x=0
state.panY = -((cvs.height / state.zoom) - CANVAS_H) / 2;

loadTextureCatalog();
render();
pushHistory(); // initial snapshot
</script>
