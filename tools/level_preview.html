<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FloQuest — Level Preview</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; }
  #hud {
    position: fixed; top: 8px; left: 8px; z-index: 9999;
    font: 12px monospace; color: #aaa; background: #000a; padding: 8px 12px;
    border-radius: 4px; pointer-events: none;
  }
  #hud kbd { background: #333; padding: 1px 5px; border-radius: 2px; color: #ddd; }
</style>
</head>
<body>
<div id="hud">
  Drag to pan &middot; Scroll to zoom &middot; <kbd>ESC</kbd> close
</div>

<!-- Phaser -->
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<!-- Game modules we reuse -->
<script src="../js/config.js"></script>
<script src="../js/utils/LightPipeline.js"></script>
<script src="../js/objects/Player.js"></script>

<script>
// Read level data from localStorage (set by the editor)
var levelData = null;
try {
  levelData = JSON.parse(localStorage.getItem('_floquest_preview'));
} catch (e) {}

if (!levelData) {
  document.body.innerHTML = '<p style="color:#f44;font:20px monospace;padding:40px;">No preview data. Use the Preview button in the editor.</p>';
  throw new Error('No preview data');
}

// Configure viewport
var VIEWPORT_H = 960;
var VIEWPORT_W = Math.round(window.innerWidth / window.innerHeight * VIEWPORT_H);
FloQuest.Config.VIEWPORT_W = VIEWPORT_W;
FloQuest.Config.VIEWPORT_H = VIEWPORT_H;

var game = new Phaser.Game({
  type: Phaser.WEBGL,
  width: VIEWPORT_W,
  height: VIEWPORT_H,
  backgroundColor: '#000000',
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH
  },
  scene: {
    preload: preload,
    create: create,
    update: update
  }
});

// ===== PRELOAD =====
function preload() {
  var scene = this;
  var texMap = levelData.textures || {};

  // Load level textures
  Object.entries(texMap).forEach(function(entry) {
    var tex = entry[1];
    var imgKey = 'lvl_' + tex.name;
    if (tex.frameWidth) {
      scene.load.spritesheet(imgKey, '../img/bg/' + tex.name + '.png', {
        frameWidth: tex.frameWidth,
        frameHeight: tex.frameHeight
      });
    } else {
      scene.load.image(imgKey, '../img/bg/' + tex.name + '.png');
    }
  });

  // Load player spritesheets (idle + walk_right for preview)
  var previewAnims = ['idle', 'walk_right'];
  var allAnims = Object.keys(FloQuest.Player.ANIM_DATA);
  allAnims.forEach(function(key) {
    scene.load.spritesheet(key, '../img/' + key + '_color.png', {
      frameWidth: 128, frameHeight: 128
    });
    scene.load.image(key + '_n', '../img/' + key + '_normal.png');
  });
}

// ===== CREATE =====
function create() {
  var scene = this;
  var data = levelData;
  var elements = data.elements || [];
  var texMap = data.textures || {};
  var lighting = data.lighting || {};

  // Register lit pipeline + player normal maps
  FloQuest.LightPipeline.register(scene);
  FloQuest.Player.setupNormalMaps(scene);
  FloQuest.Player.createAnimations(scene);

  // Enable lights
  scene.lights.enable();
  var ambHex = (lighting.ambientColor || '#0a0a10').replace('#', '');
  scene.lights.setAmbientColor(parseInt(ambHex, 16));

  // Build texId -> Phaser key mapping
  var keyMap = {};
  Object.entries(texMap).forEach(function(entry) {
    keyMap[entry[0]] = 'lvl_' + entry[1].name;
  });

  // Sort visual elements by layer
  var visual = elements.filter(function(el) { return el.type !== 'light'; });
  visual.sort(function(a, b) { return (a.layer || 0) - (b.layer || 0); });

  function parseTint(tint) {
    if (!tint) return null;
    return parseInt(tint.replace('#', ''), 16);
  }
  function applyTint(obj, el) {
    var t = parseTint(el.tint);
    if (t !== null) obj.setTint(t);
  }
  function applyTransform(obj, el) {
    if (!el.flipX && !el.flipY && !el.rotation) return;
    obj.setOrigin(0.5, 0.5);
    obj.setPosition(el.x + el.w / 2, el.y + el.h / 2);
    if (el.flipX) obj.setFlipX(true);
    if (el.flipY) obj.setFlipY(true);
    if (el.rotation) obj.setAngle(el.rotation);
  }

  // Render visual elements (same as LevelBackground.create)
  visual.forEach(function(el) {
    var imgKey = keyMap[el.texId];
    var texInfo = texMap[el.texId];
    if (!imgKey || !scene.textures.exists(imgKey)) {
      var g = scene.add.graphics().setDepth(el.layer || 0);
      g.fillStyle(0x2a1a2a, 0.5);
      g.fillRect(el.x, el.y, el.w, el.h);
      return;
    }

    if (texInfo && texInfo.frameWidth) {
      var animKey = 'lvlanim_' + el.texId;
      if (!scene.anims.exists(animKey)) {
        var totalFrames = scene.textures.get(imgKey).frameTotal;
        var fc = totalFrames > 1 ? totalFrames - 1 : 1;
        scene.anims.create({
          key: animKey,
          frames: scene.anims.generateFrameNumbers(imgKey, { start: 0, end: fc - 1 }),
          frameRate: texInfo.frameRate || 10,
          repeat: -1
        });
      }
      var animSprite = scene.add.sprite(el.x, el.y, imgKey, 0)
        .setOrigin(0, 0).setDisplaySize(el.w, el.h).setDepth(el.layer || 0);
      applyTint(animSprite, el);
      applyTransform(animSprite, el);
      animSprite.play(animKey);
      return;
    }

    if (el.tile) {
      var srcTex = scene.textures.get(imgKey);
      var srcW = srcTex.source[0].width;
      var srcH = srcTex.source[0].height;
      for (var ty = el.y; ty < el.y + el.h; ty += srcH) {
        for (var tx = el.x; tx < el.x + el.w; tx += srcW) {
          var cw = Math.min(srcW, el.x + el.w - tx);
          var ch = Math.min(srcH, el.y + el.h - ty);
          var img = scene.add.image(tx, ty, imgKey)
            .setOrigin(0, 0).setDepth(el.layer || 0);
          applyTint(img, el);
          if (cw < srcW || ch < srcH) img.setCrop(0, 0, cw, ch);
        }
      }
    } else {
      var sprite = scene.add.image(el.x, el.y, imgKey)
        .setOrigin(0, 0).setDisplaySize(el.w, el.h).setDepth(el.layer || 0);
      applyTint(sprite, el);
      applyTransform(sprite, el);
    }
  });

  // Glow texture
  var glowKey = '_lvl_glow';
  if (!scene.textures.exists(glowKey)) {
    var glowSize = 256;
    var canvas = document.createElement('canvas');
    canvas.width = glowSize; canvas.height = glowSize;
    var gctx = canvas.getContext('2d');
    var grad = gctx.createRadialGradient(glowSize/2, glowSize/2, 0, glowSize/2, glowSize/2, glowSize/2);
    grad.addColorStop(0, 'rgba(255,255,255,1)');
    grad.addColorStop(0.3, 'rgba(255,255,255,0.4)');
    grad.addColorStop(0.6, 'rgba(255,255,255,0.1)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    gctx.fillStyle = grad;
    gctx.fillRect(0, 0, glowSize, glowSize);
    scene.textures.addCanvas(glowKey, canvas);
  }

  // Add lights
  var lightMult = lighting.lightMultiplier != null ? lighting.lightMultiplier : 1.0;
  var lightEls = elements.filter(function(el) { return el.type === 'light'; });
  lightEls.forEach(function(el) {
    if (el.lightMode === 'directional') return; // TODO
    var hex = (el.lightColor || '#fff2dd').replace('#', '');
    var colorNum = parseInt(hex, 16);
    var radius = el.lightRadius || 400;
    var intensity = (el.lightIntensity || 1.0) * lightMult;
    scene.lights.addLight(el.x, el.y, radius, colorNum, intensity);

    // Glow
    var glow = scene.add.image(el.x, el.y, glowKey)
      .setDisplaySize(radius * 2, radius * 2)
      .setBlendMode(Phaser.BlendModes.ADD)
      .setAlpha(Math.min(0.5, intensity * 0.2))
      .setDepth(6);
    glow.resetPipeline(true);
    glow.setTint(colorNum);
  });

  // Player light (optional)
  if (lighting.playerLight) {
    var plHex = (lighting.playerLightColor || '#fff2dd').replace('#', '');
    scene._playerLight = scene.lights.addLight(
      200, VIEWPORT_H / 2,
      lighting.playerLightRadius || 400,
      parseInt(plHex, 16),
      lighting.playerLightIntensity || 1.0
    );
  }

  // Player sprite with lit pipeline
  var skyH = data.skyHeight || 0;
  var floorH = VIEWPORT_H - skyH;
  var centerY = skyH + floorH / 2;
  scene._player = scene.add.sprite(300, centerY, 'idle')
    .setScale(FloQuest.Config.SPRITE_SCALE)
    .setDepth(2);
  scene._player.setPipeline('LitSpritePipeline');
  scene._player.play('anim_idle');

  // Camera — full world, start at 0
  var worldW = 21880; // TILE_INTRO + TILE_QUESTION * 10
  scene.cameras.main.setBounds(0, 0, worldW, VIEWPORT_H);
  scene.cameras.main.setScroll(0, 0);

  // Drag to pan
  scene._dragging = false;
  scene._dragStart = { x: 0, y: 0 };

  scene.input.on('pointerdown', function(pointer) {
    scene._dragging = true;
    scene._dragStart.x = pointer.x;
    scene._dragStart.y = pointer.y;
  });
  scene.input.on('pointermove', function(pointer) {
    if (!scene._dragging) return;
    var cam = scene.cameras.main;
    var dx = (scene._dragStart.x - pointer.x) / cam.zoom;
    var dy = (scene._dragStart.y - pointer.y) / cam.zoom;
    cam.scrollX += dx;
    cam.scrollY += dy;
    scene._dragStart.x = pointer.x;
    scene._dragStart.y = pointer.y;
  });
  scene.input.on('pointerup', function() { scene._dragging = false; });

  // Scroll to zoom
  scene.input.on('wheel', function(pointer, gameObjects, dx, dy) {
    var cam = scene.cameras.main;
    var factor = dy > 0 ? 0.9 : 1.1;
    cam.zoom = Phaser.Math.Clamp(cam.zoom * factor, 0.1, 3);
  });

  // ESC to close
  scene.input.keyboard.on('keydown-ESC', function() {
    window.close();
  });

  // Arrow keys move player
  scene._cursors = scene.input.keyboard.createCursorKeys();
}

// ===== UPDATE =====
function update() {
  var scene = this;
  if (!scene._player) return;

  var speed = 3;
  var moved = false;
  if (scene._cursors.left.isDown) { scene._player.x -= speed; moved = true; }
  if (scene._cursors.right.isDown) { scene._player.x += speed; moved = true; }
  if (scene._cursors.up.isDown) { scene._player.y -= speed; moved = true; }
  if (scene._cursors.down.isDown) { scene._player.y += speed; moved = true; }

  // Switch animation
  var currentAnim = scene._player.anims.currentAnim ? scene._player.anims.currentAnim.key : '';
  if (moved && currentAnim !== 'anim_walk_right') {
    scene._player.play('anim_walk_right');
  } else if (!moved && currentAnim !== 'anim_idle') {
    scene._player.play('anim_idle');
  }

  // Update player light position
  if (scene._playerLight) {
    scene._playerLight.x = scene._player.x;
    scene._playerLight.y = scene._player.y - 30;
  }
}
</script>
</body>
</html>
